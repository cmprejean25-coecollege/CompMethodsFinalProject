<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Traffic Simulation - Turning & Completion</title>
<style>
  body { margin: 0; background: #2c3e50; overflow: hidden; font-family: sans-serif; }
  canvas { display: block; margin: auto; background: #27ae60; }
  #uiOverlay, #crashOverlay, #winOverlay {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; flex-direction: column; color: white; pointer-events: none;
  }
  #uiOverlay { background: rgba(0,0,0,0.6); pointer-events: all; }
  #crashOverlay { display: none; background: rgba(200,0,0,0.7); font-size: 28px; pointer-events: all; }
  #winOverlay { display: none; background: rgba(46, 204, 113, 0.8); font-size: 28px; pointer-events: all; }
  button { padding: 12px 24px; font-size: 18px; margin-top: 10px; cursor: pointer; border: none; border-radius: 4px; }
</style>
</head>
<body>

<canvas id="simCanvas" width="800" height="600"></canvas>

<div id="uiOverlay">
  <h1>🚦 Advanced Traffic Sim</h1>
  <p>Random Turns | Completion Logic</p>
  <button onclick="reset()">▶ Start Simulation</button>
</div>

<div id="crashOverlay">
  🚨 COLLISION 🚨
  <button onclick="reset()">🔁 Restart</button>
</div>

<div id="winOverlay">
  ✅ ALL CARS PASSED!
  <button onclick="reset()">🔁 Run Again</button>
</div>

<script>
const canvas = document.getElementById("simCanvas");
const ctx = canvas.getContext("2d");
const roadWidth = 120;
let running = false;
let cars = [];

// Light Logic
let lightState = "NS"; 
let timer = 0;
const GREEN_TIME = 200;
const BUFFER_TIME = 100;
let nextPhase = "EW";

class Car {
  constructor(x, y, dx, dy, color) {
    this.x = x; this.y = y; this.dx = dx; this.dy = dy;
    this.initialDx = dx; this.initialDy = dy;
    this.speed = 2;
    this.width = 24; this.height = 14;
    this.color = color;
    this.crossedIntersection = false;
    this.isTurning = false;
    this.turnDirection = ["left", "right", "straight"][Math.floor(Math.random() * 3)];
    this.angle = Math.atan2(dy, dx);
    this.finished = false;
  }

  getBounds() {
    return { x: this.x - 10, y: this.y - 10, w: 20, h: 20 };
  }

  update(frontCar) {
    if (this.finished) return;

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    let canMove = true;

    // 1. Follow Distance
    if (frontCar) {
      const d = Math.hypot(this.x - frontCar.x, this.y - frontCar.y);
      if (d < 45) canMove = false;
    }

    // 2. Intersection Stop Logic
    const distToCenter = Math.hypot(this.x - cx, this.y - cy);
    if (!this.crossedIntersection && distToCenter < 110) {
      const isNS = (this.initialDy !== 0);
      const green = isNS ? (lightState === "NS") : (lightState === "EW");
      if (!green && distToCenter > 70) canMove = false;
    }

    if (canMove) {
      // 3. Turning Logic
      if (!this.crossedIntersection && distToCenter < 30) {
        this.handleTurn();
      }

      this.x += Math.cos(this.angle) * this.speed;
      this.y += Math.sin(this.angle) * this.speed;

      if (distToCenter > 100 && !this.crossedIntersection) this.crossedIntersection = true;

      // 4. Check if off screen
      if (this.x < -100 || this.x > canvas.width + 100 || this.y < -100 || this.y > canvas.height + 100) {
        this.finished = true;
      }
    }
  }

  handleTurn() {
    if (this.turnDirection === "straight") return;
    
    const turnSpeed = 0.06;
    if (this.turnDirection === "left") this.angle -= turnSpeed;
    if (this.turnDirection === "right") this.angle += turnSpeed;
  }

  draw() {
    if (this.finished) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
    ctx.fillStyle = "white"; // Headlights
    ctx.fillRect(this.width/2 - 4, -this.height/2 + 2, 4, 3);
    ctx.fillRect(this.width/2 - 4, this.height/2 - 5, 4, 3);
    ctx.restore();
  }
}

function updateLights() {
  timer++;
  if ((lightState === "NS" || lightState === "EW") && timer > GREEN_TIME) {
    nextPhase = (lightState === "NS") ? "EW" : "NS";
    lightState = "RED_ALL";
    timer = 0;
  } else if (lightState === "RED_ALL" && timer > BUFFER_TIME) {
    lightState = nextPhase;
    timer = 0;
  }
}

function drawRoads() {
  ctx.fillStyle = "#444";
  ctx.fillRect(0, canvas.height/2 - roadWidth/2, canvas.width, roadWidth);
  ctx.fillRect(canvas.width/2 - roadWidth/2, 0, roadWidth, canvas.height);
}

function animate() {
  if (!running) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawRoads();
  updateLights();

  let activeCars = 0;

  for (let i = 0; i < cars.length; i++) {
    let car = cars[i];
    if (car.finished) continue;
    activeCars++;

    let frontCar = null;
    let minDist = 60;
    for (let other of cars) {
      if (other === car || other.finished) continue;
      const d = Math.hypot(car.x - other.x, car.y - other.y);
      // Simple logic: if other car is in front based on current angle
      const angleToOther = Math.atan2(other.y - car.y, other.x - car.x);
      if (d < minDist && Math.abs(angleToOther - car.angle) < 0.5) {
        minDist = d; frontCar = other;
      }
    }

    car.update(frontCar);
    car.draw();

    // Collision (Inside intersection primarily)
    if (Math.hypot(car.x - 400, car.y - 300) < 150) {
        for (let j = i + 1; j < cars.length; j++) {
            let b = cars[j];
            if (b.finished) continue;
            if (Math.hypot(car.x - b.x, car.y - b.y) < 15) {
                running = false;
                document.getElementById("crashOverlay").style.display = "flex";
            }
        }
    }
  }

  if (activeCars === 0) {
    running = false;
    document.getElementById("winOverlay").style.display = "flex";
  }

  requestAnimationFrame(animate);
}

function reset() {
  cars = [];
  running = true;
  timer = 0;
  lightState = "NS";
  document.getElementById("uiOverlay").style.display = "none";
  document.getElementById("crashOverlay").style.display = "none";
  document.getElementById("winOverlay").style.display = "none";

  const count = 15; // Total cars for testing (change to 75 per lane for 300)
  for (let i = 0; i < count; i++) {
    const spacing = 60;
    const colors = ["#3498db", "#e67e22", "#9b59b6", "#f1c40f"];
    const c = () => colors[Math.floor(Math.random() * colors.length)];
    
    cars.push(new Car(-(100 + i*spacing), 325, 1, 0, c())); // Eastbound
    cars.push(new Car(800 + (100 + i*spacing), 275, -1, 0, c())); // Westbound
    cars.push(new Car(375, -(100 + i*spacing), 0, 1, c())); // Southbound
    cars.push(new Car(425, 600 + (100 + i*spacing), 0, -1, c())); // Northbound
  }
  animate();
}
</script>
</body>
</html>
