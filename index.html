<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Traffic Simulation - 300 Cars Fixed</title>

<style>
  body {
    margin: 0;
    background: #2c3e50;
    overflow: hidden;
  }

  canvas {
    display: block;
    margin: auto;
    background: #27ae60;
  }

  #uiOverlay, #crashOverlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-family: Arial, sans-serif;
    color: white;
    pointer-events: none;
  }

  #uiOverlay { background: rgba(0,0,0,0.6); pointer-events: all; }

  #crashOverlay {
    display: none;
    background: rgba(200,0,0,0.65);
    font-size: 28px;
    pointer-events: all;
  }

  button {
    padding: 12px 24px;
    font-size: 18px;
    margin-top: 10px;
    cursor: pointer;
  }
</style>
</head>

<body>

<canvas id="simCanvas" width="800" height="600"></canvas>

<div id="uiOverlay">
  <h1>🚦 Traffic Simulation (300 Cars)</h1>
  <button id="startBtn">▶ Start</button>
</div>

<div id="crashOverlay">
  🚨 COLLISION DETECTED 🚨
  <button id="restartBtn">🔁 Restart</button>
</div>

<script>
const canvas = document.getElementById("simCanvas");
const ctx = canvas.getContext("2d");

const uiOverlay = document.getElementById("uiOverlay");
const crashOverlay = document.getElementById("crashOverlay");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");

const roadWidth = 120;
let running = false;

// ---------------- LIGHT SYSTEM ----------------
let lightState = "NS"; 
let timer = 0;
const GREEN_TIME = 250;

// ---------------- CAR CLASS ----------------
class Car {
  constructor(x, y, dx, dy) {
    this.x = x;
    this.y = y;
    this.dx = dx;
    this.dy = dy;
    this.speed = 1.8;
    this.width = 22; 
    this.height = 12;
    this.crossedIntersection = false;
  }

  getBounds() {
    // Correct hitboxes for horizontal vs vertical
    if (this.dy !== 0) {
        return { x: this.x - this.height/2, y: this.y - this.width/2, w: this.height, h: this.width };
    }
    return { x: this.x - this.width/2, y: this.y - this.height/2, w: this.width, h: this.height };
  }

  update(frontCar) {
    let canMove = true;
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    const stopLines = {
      N: cy - roadWidth / 2 - 5,
      S: cy + roadWidth / 2 + 5,
      W: cx - roadWidth / 2 - 5,
      E: cx + roadWidth / 2 + 5
    };

    // 1. Check Front Car (keep distance)
    if (frontCar) {
      let dist = Infinity;
      if (this.dx > 0) dist = frontCar.x - this.x;
      else if (this.dx < 0) dist = this.x - frontCar.x;
      else if (this.dy > 0) dist = frontCar.y - this.y;
      else if (this.dy < 0) dist = this.y - frontCar.y;

      if (dist < 35) canMove = false; 
    }

    // 2. Traffic Light Logic
    if (!this.crossedIntersection) {
      const lookAhead = 25;
      if (this.dy !== 0) {
        const isGreen = (lightState === "NS");
        const stopLine = (this.dy > 0) ? stopLines.N : stopLines.S;
        const willCross = (this.dy > 0) ? (this.y + lookAhead > stopLine && this.y < stopLine) : (this.y - lookAhead < stopLine && this.y > stopLine);
        if (willCross && !isGreen) canMove = false;
      } else {
        const isGreen = (lightState === "EW");
        const stopLine = (this.dx > 0) ? stopLines.W : stopLines.E;
        const willCross = (this.dx > 0) ? (this.x + lookAhead > stopLine && this.x < stopLine) : (this.x - lookAhead < stopLine && this.x > stopLine);
        if (willCross && !isGreen) canMove = false;
      }
    }

    if (canMove) {
      this.x += this.dx * this.speed;
      this.y += this.dy * this.speed;

      // Mark crossed once center is past the intersection exit
      if (this.dx > 0 && this.x > cx + roadWidth/2) this.crossedIntersection = true;
      if (this.dx < 0 && this.x < cx - roadWidth/2) this.crossedIntersection = true;
      if (this.dy > 0 && this.y > cy + roadWidth/2) this.crossedIntersection = true;
      if (this.dy < 0 && this.y < cy - roadWidth/2) this.crossedIntersection = true;
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);

    if (this.dx > 0) ctx.rotate(0);
    else if (this.dx < 0) ctx.rotate(Math.PI);
    else if (this.dy > 0) ctx.rotate(Math.PI/2);
    else ctx.rotate(-Math.PI/2);

    ctx.fillStyle = "#3498db";
    ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
    
    // Headlights
    ctx.fillStyle = "white";
    ctx.fillRect(this.width/2 - 4, -this.height/2, 4, 2);
    ctx.fillRect(this.width/2 - 4, this.height/2 - 2, 4, 2);

    ctx.restore();
  }
}

// ---------------- ENGINE ----------------
let cars = [];

function createCars() {
  const perLane = 75; 
  const spacing = 45; // Increased spacing to prevent offscreen clusters

  for (let i = 0; i < perLane; i++) {
    // Westbound (East to West) - Top lane of horizontal road
    cars.push(new Car(canvas.width + 50 + (i * spacing), canvas.height/2 - 25, -1, 0));
    // Eastbound (West to East) - Bottom lane of horizontal road
    cars.push(new Car(-(50 + i * spacing), canvas.height/2 + 25, 1, 0));
    // Southbound (North to South) - Left lane of vertical road
    cars.push(new Car(canvas.width/2 - 25, -(50 + i * spacing), 0, 1));
    // Northbound (South to North) - Right lane of vertical road
    cars.push(new Car(canvas.width/2 + 25, canvas.height + 50 + (i * spacing), 0, -1));
  }
}

function drawEnvironment() {
  // Asphalt
  ctx.fillStyle = "#555";
  ctx.fillRect(0, canvas.height/2 - roadWidth/2, canvas.width, roadWidth);
  ctx.fillRect(canvas.width/2 - roadWidth/2, 0, roadWidth, canvas.height);
  
  // Center Lines
  ctx.strokeStyle = "#f1c40f";
  ctx.setLineDash([10, 10]);
  ctx.beginPath();
  ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2);
  ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height);
  ctx.stroke();
  ctx.setLineDash([]);

  // --- TRAFFIC LIGHTS ---
  const cx = canvas.width/2;
  const cy = canvas.height/2;
  const offset = roadWidth/2 + 15;

  // NS Lights
  ctx.fillStyle = (lightState === "NS") ? "#2ecc71" : "#e74c3c";
  ctx.beginPath();
  ctx.arc(cx - offset, cy - offset, 8, 0, Math.PI*2); // Top Left
  ctx.arc(cx + offset, cy + offset, 8, 0, Math.PI*2); // Bottom Right
  ctx.fill();

  // EW Lights
  ctx.fillStyle = (lightState === "EW") ? "#2ecc71" : "#e74c3c";
  ctx.beginPath();
  ctx.arc(cx + offset, cy - offset, 8, 0, Math.PI*2); // Top Right
  ctx.arc(cx - offset, cy + offset, 8, 0, Math.PI*2); // Bottom Left
  ctx.fill();
}

function checkCollision(a, b) {
  const A = a.getBounds();
  const B = b.getBounds();
  return !(A.x + A.w < B.x || A.x > B.x + B.w || A.y + A.h < B.y || A.y > B.y + B.h);
}

function animate() {
  if (!running) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawEnvironment();
  
  timer++;
  if (timer > GREEN_TIME) {
    lightState = (lightState === "NS") ? "EW" : "NS";
    timer = 0;
  }

  for (let i = 0; i < cars.length; i++) {
    let car = cars[i];
    
    // Logic for following distance
    let frontCar = null;
    let minDist = Infinity;
    for (let other of cars) {
      if (other === car) continue;
      if (car.dx === other.dx && car.dy === other.dy) {
          let d = Infinity;
          if (car.dx > 0 && other.x > car.x) d = other.x - car.x;
          else if (car.dx < 0 && other.x < car.x) d = car.x - other.x;
          else if (car.dy > 0 && other.y > car.y) d = other.y - car.y;
          else if (car.dy < 0 && other.y < car.y) d = car.y - other.y;
          if (d < minDist) { minDist = d; frontCar = other; }
      }
    }

    car.update(frontCar);
    car.draw();

    // COLLISION CHECK: Only check if car is on screen to prevent offscreen ghost crashes
    if (car.x > 0 && car.x < canvas.width && car.y > 0 && car.y < canvas.height) {
        for (let j = i + 1; j < cars.length; j++) {
            let other = cars[j];
            // Only check nearby cars for performance
            if (Math.abs(car.x - other.x) < 30 && Math.abs(car.y - other.y) < 30) {
                if (checkCollision(car, other)) {
                    running = false;
                    crashOverlay.style.display = "flex";
                    return;
                }
            }
        }
    }
  }
  requestAnimationFrame(animate);
}

function reset() {
  cars = [];
  lightState = "NS";
  timer = 0;
  crashOverlay.style.display = "none";
  uiOverlay.style.display = "none";
  createCars();
  running = true;
  animate();
}

startBtn.addEventListener("click", reset);
restartBtn.addEventListener("click", reset);
</script>

</body>
</html>
