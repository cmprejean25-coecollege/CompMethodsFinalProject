<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloverleaf Interchange Simulation</title>
    <style>
        body { margin: 0; background: #2c3e50; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; color: white; }
        canvas { background: #34495e; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 8px; margin-top: 20px; }
        .controls { padding: 20px; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; background: #e67e22; border: none; color: white; border-radius: 5px; font-weight: bold; }
        button:hover { background: #d35400; }
    </style>
</head>
<body>

    <div class="controls">
        <h1>Cloverleaf Interchange</h1>
        <p>A 2D simulation of weaving traffic patterns.</p>
        <button onclick="addCar()">Add Random Car</button>
    </div>
    <canvas id="simCanvas" width="800" height="800"></canvas>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const cars = [];

// Configuration
const roadWidth = 60;
const center = 400;
const loopRadius = 80;

class Car {
    constructor(lane) {
        this.lane = lane; // 0: North, 1: East, 2: South, 3: West
        this.speed = 1.5 + Math.random() * 1.5;
        this.progress = 0;
        this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
        this.type = Math.floor(Math.random() * 3); // 0: Straight, 1: Right, 2: Loop (Left)
        this.x = 0;
        this.y = 0;
    }

    update() {
        this.progress += this.speed;
        this.calculatePosition();
    }

    calculatePosition() {
        let t = this.progress;
        let x = 0, y = 0, angle = 0;

        // Simplified logic for a North-bound car as a baseline
        // Note: Real world cloverleafs involve complex Bezier transitions.
        // This logic maps the 4 directions based on the lane index.
        
        if (this.type === 0) { // Straight
            x = center + 15;
            y = 800 - t;
        } else if (this.type === 1) { // Right Turn
            if (t < 350) { x = center + 15; y = 800 - t; }
            else { 
                let angle = (t - 350) * 0.01;
                x = center + 15 + Math.sin(angle) * 50;
                y = 450 - Math.cos(angle) * 50;
            }
        } else { // The Clover Leaf (Left turn loop)
            if (t < 450) { x = center + 15; y = 800 - t; }
            else if (t < 850) {
                let loopT = (t - 450) * 0.015;
                x = (center + 15 + loopRadius) - Math.cos(loopT) * loopRadius;
                y = (center - 50) - Math.sin(loopT) * loopRadius;
            } else {
                x = center + 15 + (t - 850);
                y = center - 15;
            }
        }

        // Rotate coordinates based on entry direction
        const relX = x - center;
        const relY = y - center;
        const rot = (this.lane * Math.PI) / 2;
        
        this.x = center + (relX * Math.cos(rot) - relY * Math.sin(rot));
        this.y = center + (relX * Math.sin(rot) + relY * Math.cos(rot));
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.fillRect(-6, -10, 12, 20);
        ctx.restore();
    }
}

function drawRoads() {
    ctx.strokeStyle = "#7f8c8d";
    ctx.lineWidth = roadWidth;
    
    // Main Roads
    ctx.beginPath();
    ctx.moveTo(center, 0); ctx.lineTo(center, 800);
    ctx.moveTo(0, center); ctx.lineTo(800, center);
    ctx.stroke();

    // Leaf Loops
    ctx.lineWidth = 30;
    ctx.beginPath();
    // Top Right Leaf
    ctx.arc(center + 60, center - 60, 50, 0, Math.PI * 2);
    // Top Left Leaf
    ctx.arc(center - 60, center - 60, 50, 0, Math.PI * 2);
    // Bottom Right Leaf
    ctx.arc(center + 60, center + 60, 50, 0, Math.PI * 2);
    // Bottom Left Leaf
    ctx.arc(center - 60, center + 60, 50, 0, Math.PI * 2);
    ctx.stroke();
    
    // Center lines
    ctx.setLineDash([20, 20]);
    ctx.strokeStyle = "#f1c40f";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(center, 0); ctx.lineTo(center, 800);
    ctx.moveTo(0, center); ctx.lineTo(800, center);
    ctx.stroke();
    ctx.setLineDash([]);
}

function addCar() {
    cars.push(new Car(Math.floor(Math.random() * 4)));
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawRoads();
    
    for (let i = cars.length - 1; i >= 0; i--) {
        cars[i].update();
        cars[i].draw();
        // Remove off-screen cars
        if (cars[i].x < -50 || cars[i].x > 850 || cars[i].y < -50 || cars[i].y > 850) {
            cars.splice(i, 1);
        }
    }
    requestAnimationFrame(animate);
}

// Start with some cars
for(let i=0; i<8; i++) addCar();
animate();
</script>
</body>
</html>
