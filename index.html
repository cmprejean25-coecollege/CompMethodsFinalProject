<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Traffic Simulation - Fixed</title>

<style>
  body {
    margin: 0;
    background: #2c3e50;
    overflow: hidden;
  }

  canvas {
    display: block;
    margin: auto;
    background: #27ae60;
  }

  #uiOverlay, #crashOverlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    font-family: Arial, sans-serif;
    color: white;
    pointer-events: none;
  }

  #uiOverlay { background: rgba(0,0,0,0.6); pointer-events: all; }

  #crashOverlay {
    display: none;
    background: rgba(200,0,0,0.65);
    font-size: 28px;
    pointer-events: all;
  }

  button {
    padding: 12px 24px;
    font-size: 18px;
    margin-top: 10px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
  }
</style>
</head>

<body>

<canvas id="simCanvas" width="800" height="600"></canvas>

<div id="uiOverlay">
  <h1>🚦 Traffic Simulation</h1>
  <button id="startBtn">▶ Start</button>
</div>

<div id="crashOverlay">
  🚨 COLLISION DETECTED 🚨
  <button id="restartBtn">🔁 Restart</button>
</div>

<script>
const canvas = document.getElementById("simCanvas");
const ctx = canvas.getContext("2d");

const uiOverlay = document.getElementById("uiOverlay");
const crashOverlay = document.getElementById("crashOverlay");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");

const roadWidth = 120;
let running = false;

// ---------------- LIGHT SYSTEM ----------------
let lightState = "NS"; // NS = North/South Green, EW = East/West Green
let timer = 0;
const GREEN_TIME = 200;
const ALL_RED_TIME = 100;

// ---------------- CAR CLASS ----------------
class Car {
  constructor(x, y, dx, dy, color) {
    this.x = x;
    this.y = y;
    this.dx = dx;
    this.dy = dy;
    this.speed = 2;
    this.width = 30;
    this.height = 18;
    this.color = color || "#3498db";
    this.crossedIntersection = false;
  }

  getBounds() {
    // If vertical, swap width/height for hitboxes
    const w = this.dx !== 0 ? this.width : this.height;
    const h = this.dx !== 0 ? this.height : this.width;
    return { x: this.x, y: this.y, w, h };
  }

  update(frontCar) {
    let canMove = true;
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    const stopLines = {
      N: cy - roadWidth / 2 - 10,
      S: cy + roadWidth / 2 + 10,
      W: cx - roadWidth / 2 - 10,
      E: cx + roadWidth / 2 + 10
    };

    // 1. Check Front Car (Proximity)
    if (frontCar) {
      let dist = Infinity;
      if (this.dx > 0) dist = frontCar.x - (this.x + this.width);
      if (this.dx < 0) dist = this.x - (frontCar.x + frontCar.width);
      if (this.dy > 0) dist = frontCar.y - (this.y + this.width); // width used as length when vertical
      if (this.dy < 0) dist = this.y - (frontCar.y + frontCar.width);

      if (dist < 15) canMove = false;
    }

    // 2. Traffic Light Logic
    if (!this.crossedIntersection) {
      if (this.dy !== 0) { // North/South
        const isGreen = (lightState === "NS");
        if (!isGreen) {
          if (this.dy > 0 && this.y + this.width > stopLines.N - 10 && this.y < stopLines.N) canMove = false;
          if (this.dy < 0 && this.y < stopLines.S + 10 && this.y + this.width > stopLines.S) canMove = false;
        }
      } else { // East/West
        const isGreen = (lightState === "EW");
        if (!isGreen) {
          if (this.dx > 0 && this.x + this.width > stopLines.W - 10 && this.x < stopLines.W) canMove = false;
          if (this.dx < 0 && this.x < stopLines.E + 10 && this.x + this.width > stopLines.E) canMove = false;
        }
      }
    }

    // 3. Move and Update Crossing State
    if (canMove) {
      this.x += this.dx * this.speed;
      this.y += this.dy * this.speed;

      if (this.dx > 0 && this.x > cx + roadWidth/2) this.crossedIntersection = true;
      if (this.dx < 0 && this.x < cx - roadWidth/2) this.crossedIntersection = true;
      if (this.dy > 0 && this.y > cy + roadWidth/2) this.crossedIntersection = true;
      if (this.dy < 0 && this.y < cy - roadWidth/2) this.crossedIntersection = true;
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    if (this.dy !== 0) {
        ctx.translate(this.height/2, this.width/2);
        ctx.rotate(this.dy > 0 ? Math.PI/2 : -Math.PI/2);
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
    } else {
        ctx.translate(this.width/2, this.height/2);
        if (this.dx < 0) ctx.rotate(Math.PI);
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
    }
    ctx.restore();
  }
}

// ---------------- GAME LOGIC ----------------
let cars = [];

function createCars() {
  const spacing = 100;
  for (let i = 0; i < 10; i++) {
    // West to East
    cars.push(new Car(-i * spacing, canvas.height/2 + 10, 1, 0, "#3498db"));
    // East to West
    cars.push(new Car(canvas.width + i * spacing, canvas.height/2 - 30, -1, 0, "#f1c40f"));
    // North to South
    cars.push(new Car(canvas.width/2 - 30, -i * spacing, 0, 1, "#e67e22"));
    // South to North
    cars.push(new Car(canvas.width/2 + 10, canvas.height + i * spacing, 0, -1, "#9b59b6"));
  }
}

function updateLights() {
  timer++;
  if (timer > (lightState === "ALL_RED" ? ALL_RED_TIME : GREEN_TIME)) {
    timer = 0;
    if (lightState === "NS") lightState = "ALL_RED_EW";
    else if (lightState === "ALL_RED_EW") lightState = "EW";
    else if (lightState === "EW") lightState = "ALL_RED_NS";
    else lightState = "NS";
  }
}

function drawEnvironment() {
  // Roads
  ctx.fillStyle = "#555";
  ctx.fillRect(0, canvas.height/2 - roadWidth/2, canvas.width, roadWidth);
  ctx.fillRect(canvas.width/2 - roadWidth/2, 0, roadWidth, canvas.height);

  // Markings
  ctx.strokeStyle = "white";
  ctx.setLineDash([20, 20]);
  ctx.beginPath();
  ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2);
  ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height);
  ctx.stroke();
  ctx.setLineDash([]);

  // Simple Light Indicators
  ctx.fillStyle = (lightState === "NS") ? "#2ecc71" : "#e74c3c";
  ctx.fillRect(canvas.width/2 - 80, canvas.height/2 - 80, 10, 10); // NW light
  ctx.fillRect(canvas.width/2 + 70, canvas.height/2 + 70, 10, 10); // SE light

  ctx.fillStyle = (lightState === "EW") ? "#2ecc71" : "#e74c3c";
  ctx.fillRect(canvas.width/2 + 70, canvas.height/2 - 80, 10, 10); // NE light
  ctx.fillRect(canvas.width/2 - 80, canvas.height/2 + 70, 10, 10); // SW light
}

function checkCollision(a, b) {
  const A = a.getBounds();
  const B = b.getBounds();
  return !(A.x + A.w < B.x || A.x > B.x + B.w || A.y + A.h < B.y || A.y > B.y + B.h);
}

function animate() {
  if (!running) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawEnvironment();
  updateLights();

  for (let car of cars) {
    let frontCar = null;
    let minDist = 150;

    for (let other of cars) {
      if (other === car) continue;
      // Check if in same lane and ahead
      let isSameLane = (car.dx !== 0 && car.dx === other.dx && Math.abs(car.y - other.y) < 5) ||
                       (car.dy !== 0 && car.dy === other.dy && Math.abs(car.x - other.x) < 5);
      
      if (isSameLane) {
        let d = Infinity;
        if (car.dx > 0 && other.x > car.x) d = other.x - car.x;
        if (car.dx < 0 && other.x < car.x) d = car.x - other.x;
        if (car.dy > 0 && other.y > car.y) d = other.y - car.y;
        if (car.dy < 0 && other.y < car.y) d = car.y - other.y;
        
        if (d < minDist) {
          minDist = d;
          frontCar = other;
        }
      }
    }

    car.update(frontCar);
    car.draw();
  }

  // Collision detection
  for (let i = 0; i < cars.length; i++) {
    for (let j = i + 1; j < cars.length; j++) {
      if (checkCollision(cars[i], cars[j])) {
        running = false;
        crashOverlay.style.display = "flex";
      }
    }
  }

  requestAnimationFrame(animate);
}

function reset() {
  cars = [];
  lightState = "NS";
  timer = 0;
  crashOverlay.style.display = "none";
  uiOverlay.style.display = "none";
  createCars();
  running = true;
  animate();
}

startBtn.addEventListener("click", reset);
restartBtn.addEventListener("click", reset);
</script>
</body>
</html>
