<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Precision Aerial Cloverleaf Simulation</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #2d4c1e; }
        .ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 4px; pointer-events: none; border-left: 4px solid #777; }
    </style>
</head>
<body>
    <div class="ui">
        <b>Interchange Model #199998956</b><br>
        Tapered Exit/Entry Geometries<br>
        Dual-Carriageway Pathfinding
    </div>
    <canvas id="simCanvas"></canvas>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
let cars = [];

const SCALE = 1.0;
const ROAD_COLOR = "#3b3d3b";
const LINE_COLOR = "rgba(255,255,255,0.4)";
const MEDIAN_W = 12;
const LANE_W = 28;
const HIGHWAY_W = (LANE_W * 2); // 2 lanes per side

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Car {
    constructor(laneIdx) {
        this.dir = laneIdx; // 0:N, 1:E, 2:S, 3:W
        this.type = Math.random() < 0.2 ? 'right' : (Math.random() < 0.4 ? 'loop' : 'straight');
        this.speed = 3 + Math.random() * 2;
        this.progress = 0;
        this.x = 0; this.y = 0; this.angle = 0;
        this.isOverpass = (this.dir === 1 || this.dir === 3);
    }

    update() {
        const oldX = this.x; const oldY = this.y;
        this.progress += this.speed;
        
        let tx = (MEDIAN_W / 2) + (LANE_W / 2); // Center of the right-hand lanes
        let ty = 600 - this.progress;

        // PATH LOGIC - Matching the tapered curves in the photo
        if (this.type === 'right') {
            // Outer Sweeping Ramp
            if (this.progress > 300) {
                let t = (this.progress - 300) * 0.004;
                tx += Math.pow(t * 150, 1.3);
                ty = 300 - (t * 100);
            }
        } else if (this.type === 'loop') {
            // The "Leaf" Loop
            if (this.progress > 450 && this.progress < 1050) {
                let t = (this.progress - 450) * 0.012;
                // Complex spiral-to-circle transition
                const r = 85 + Math.sin(t*0.5)*10; 
                tx = ( (MEDIAN_W/2 + LANE_W/2) + r) - Math.cos(t) * r;
                ty = (150 - r) - Math.sin(t) * r;
            } else if (this.progress >= 1050) {
                tx = (MEDIAN_W/2 + LANE_W/2) + (this.progress - 1050);
                ty = -70; // Offset for merging into the cross-street
            }
        }

        // Translation to Global Coordinates
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const rot = (this.dir * Math.PI) / 2;
        
        this.x = centerX + (tx * Math.cos(rot) - ty * Math.sin(rot));
        this.y = centerY + (tx * Math.sin(rot) + ty * Math.cos(rot));
        this.angle = Math.atan2(this.y - oldY, this.x - oldX) + Math.PI/2;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillStyle = "#eee";
        ctx.fillRect(-5, -9, 10, 18); // Car body
        ctx.fillStyle = "#333";
        ctx.fillRect(-3, -5, 6, 6);   // Windshield
        // Headlights
        ctx.fillStyle = "#fffca8"; ctx.shadowBlur = 6; ctx.shadowColor = "#fffca8";
        ctx.fillRect(-4, -10, 2, 2); ctx.fillRect(2, -10, 2, 2);
        ctx.restore();
        ctx.shadowBlur = 0;
    }
}

function drawRoadway() {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    // 1. Draw Underpass Shadows (Depth effect)
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(cx - 150, cy - (HIGHWAY_W + MEDIAN_W/2 + 10), 300, 5);
    ctx.fillRect(cx - 150, cy + (HIGHWAY_W + MEDIAN_W/2 + 5), 300, 5);

    // 2. Draw North-South Highway (Bottom Road)
    drawHighway(cx, cy, true);

    // 3. Draw Ramps & Loops
    drawRamps(cx, cy);

    // 4. Draw East-West Highway (The Overpass)
    // Add bridge structure
    ctx.fillStyle = "#222"; // Side walls of the bridge
    ctx.fillRect(0, cy - (HIGHWAY_W + MEDIAN_W/2 + 4), canvas.width, (HIGHWAY_W * 2) + MEDIAN_W + 8);
    drawHighway(cx, cy, false);
}

function drawHighway(cx, cy, isVertical) {
    ctx.strokeStyle = ROAD_COLOR;
    ctx.lineWidth = HIGHWAY_W;
    const offset = (HIGHWAY_W / 2) + (MEDIAN_W / 2);

    ctx.beginPath();
    if (isVertical) {
        ctx.moveTo(cx - offset, 0); ctx.lineTo(cx - offset, canvas.height);
        ctx.moveTo(cx + offset, 0); ctx.lineTo(cx + offset, canvas.height);
    } else {
        ctx.moveTo(0, cy - offset); ctx.lineTo(canvas.width, cy - offset);
        ctx.moveTo(0, cy + offset); ctx.lineTo(canvas.width, cy + offset);
    }
    ctx.stroke();

    // Lane Lines
    ctx.strokeStyle = LINE_COLOR;
    ctx.lineWidth = 1;
    ctx.setLineDash([10, 15]);
    ctx.stroke();
    ctx.setLineDash([]);
}

function drawRamps(cx, cy) {
    ctx.strokeStyle = ROAD_COLOR;
    const roadOffset = (HIGHWAY_W / 2) + (MEDIAN_W / 2);
    
    for (let i = 0; i < 4; i++) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(i * Math.PI / 2);
        
        // Outer Ramp (Quadratic for that "sweeping" look)
        ctx.lineWidth = 25;
        ctx.beginPath();
        ctx.moveTo(roadOffset, 320);
        ctx.quadraticCurveTo(320, 320, 320, roadOffset);
        ctx.stroke();

        // Inner Loop (Clover leaf)
        ctx.lineWidth = 22;
        ctx.beginPath();
        const r = 85;
        // The arc starts at a tangent to the highway
        ctx.arc(roadOffset + r, 150 - r, r, 0.5 * Math.PI, 1.6 * Math.PI);
        ctx.stroke();

        ctx.restore();
    }
}

function animate() {
    ctx.fillStyle = "#2d4c1e"; // Field green
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawRoadway();

    if (Math.random() < 0.07 && cars.length < 50) {
        cars.push(new Car(Math.floor(Math.random() * 4)));
    }

    // Sort: Ensure cars on the E-W bridge are drawn last
    cars.sort((a, b) => a.isOverpass - b.isOverpass);

    for (let i = cars.length - 1; i >= 0; i--) {
        cars[i].update();
        cars[i].draw();
        if (Math.abs(cars[i].x - canvas.width/2) > 1000 || Math.abs(cars[i].y - canvas.height/2) > 1000) {
            cars.splice(i, 1);
        }
    }
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
