<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Traffic Simulation (Improved Lights)</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
  }

  canvas {
    background: #6b6b6b;
    display: block;
    margin: 20px auto;
    border: 2px solid #222;
  }

  button {
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
  }

  #status {
    font-size: 18px;
    font-weight: bold;
    margin-top: 10px;
  }
</style>
</head>

<body>

<h1>🚦 Fixed Intersection (Realistic Lights)</h1>
<button onclick="start()">Start Simulation</button>
<div id="status"></div>

<canvas id="c" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const statusDiv = document.getElementById("status");

let cars = [];
let running = false;

// 🚦 2-phase system
let phase = 0;

// 🚗 lane configuration
const lanes = {
  0: { axis: "y", stop: 220, dir: -1 }, // north
  1: { axis: "x", stop: 360, dir: 1 },  // east
  2: { axis: "y", stop: 360, dir: 1 },  // south
  3: { axis: "x", stop: 220, dir: -1 }  // west
};

// 🚗 spawn
function spawnCar() {
  const dir = Math.floor(Math.random() * 4);

  let car = {
    dir,
    speed: 1.6,
    x: 0,
    y: 0
  };

  if (dir === 0) { car.x = 290; car.y = 650; }
  if (dir === 1) { car.x = -40; car.y = 290; }
  if (dir === 2) { car.x = 310; car.y = -40; }
  if (dir === 3) { car.x = 650; car.y = 310; }

  cars.push(car);
}

// 🛣️ road
function drawRoad() {
  ctx.fillStyle = "#555";
  ctx.fillRect(250, 0, 100, 600);
  ctx.fillRect(0, 250, 600, 100);

  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;

  ctx.beginPath(); ctx.moveTo(250, 220); ctx.lineTo(350, 220); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(360, 250); ctx.lineTo(360, 350); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(250, 360); ctx.lineTo(350, 360); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(220, 250); ctx.lineTo(220, 350); ctx.stroke();
}

// 🚦 UPDATED LIGHTS (realistic housing on stop lines)
function drawLights() {
  for (let i = 0; i < 4; i++) {

    let green = false;

    if (phase === 0 && (i === 0 || i === 2)) green = true;
    if (phase === 1 && (i === 1 || i === 3)) green = true;

    let x = 0, y = 0;

    if (i === 0) { x = 290; y = 220; } // north
    if (i === 1) { x = 360; y = 290; } // east
    if (i === 2) { x = 310; y = 360; } // south
    if (i === 3) { x = 220; y = 310; } // west

    // 🟧 housing
    ctx.fillStyle = "#cc7a00";
    ctx.fillRect(x - 8, y - 8, 20, 20);

    // ⚫ backing
    ctx.fillStyle = "#222";
    ctx.fillRect(x - 5, y - 5, 14, 14);

    // 🔴🟢 light
    ctx.fillStyle = green ? "lime" : "red";
    ctx.beginPath();
    ctx.arc(x + 2, y + 2, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

// 🚗 movement
function moveCar(c) {
  if (c.dir === 0) c.y -= c.speed;
  if (c.dir === 1) c.x += c.speed;
  if (c.dir === 2) c.y += c.speed;
  if (c.dir === 3) c.x -= c.speed;
}

// 🧠 intersection check
function inIntersection(c) {
  return (
    c.x > 250 && c.x < 350 &&
    c.y > 250 && c.y < 350
  );
}

// 🚗 spacing
function isTooClose(car) {
  const SAFE_DISTANCE = 18;

  for (let other of cars) {
    if (other === car) continue;
    if (other.dir !== car.dir) continue;

    if (car.dir === 0 && other.y < car.y && car.y - other.y < SAFE_DISTANCE) return true;
    if (car.dir === 2 && other.y > car.y && other.y - car.y < SAFE_DISTANCE) return true;
    if (car.dir === 1 && other.x > car.x && other.x - car.x < SAFE_DISTANCE) return true;
    if (car.dir === 3 && other.x < car.x && car.x - other.x < SAFE_DISTANCE) return true;
  }

  return false;
}

// 🚦 logic
function updateCar(c) {

  const lane = lanes[c.dir];
  const BUFFER = 6;

  const green =
    (phase === 0 && (c.dir === 0 || c.dir === 2)) ||
    (phase === 1 && (c.dir === 1 || c.dir === 3));

  let atStopLine = false;

  if (lane.axis === "y") {
    if (lane.dir === -1 && c.y <= lane.stop + BUFFER && c.y > 240) atStopLine = true;
    if (lane.dir === 1 && c.y >= lane.stop - BUFFER && c.y < 360) atStopLine = true;
  }

  if (lane.axis === "x") {
    if (lane.dir === -1 && c.x <= lane.stop + BUFFER && c.x > 240) atStopLine = true;
    if (lane.dir === 1 && c.x >= lane.stop - BUFFER && c.x < 360) atStopLine = true;
  }

  if (atStopLine && !green) {
    c.speed = 0;
    return;
  }

  if (isTooClose(c)) {
    c.speed = 0;
    return;
  }

  c.speed = 1.6;
  moveCar(c);
}

// 💥 collision
function checkCollision() {
  for (let i = 0; i < cars.length; i++) {
    for (let j = i + 1; j < cars.length; j++) {

      const a = cars[i];
      const b = cars[j];

      const dx = a.x - b.x;
      const dy = a.y - b.y;

      if (dx * dx + dy * dy < 100) {
        running = false;
        statusDiv.textContent = "💥 COLLISION DETECTED";
        return;
      }
    }
  }
}

// 🚗 draw cars
function drawCars() {
  cars.forEach(c => {
    ctx.fillStyle = "#00aaff";
    ctx.fillRect(c.x, c.y, 12, 12);

    ctx.fillStyle = "yellow";

    if (c.dir === 0) {
      ctx.fillRect(c.x + 3, c.y - 2, 3, 2);
      ctx.fillRect(c.x + 7, c.y - 2, 3, 2);
    }
    if (c.dir === 1) {
      ctx.fillRect(c.x + 12, c.y + 3, 2, 3);
      ctx.fillRect(c.x + 12, c.y + 7, 2, 3);
    }
    if (c.dir === 2) {
      ctx.fillRect(c.x + 3, c.y + 12, 3, 2);
      ctx.fillRect(c.x + 7, c.y + 12, 3, 2);
    }
    if (c.dir === 3) {
      ctx.fillRect(c.x - 2, c.y + 3, 2, 3);
      ctx.fillRect(c.x - 2, c.y + 7, 2, 3);
    }
  });
}

// 🔁 loop
function loop() {
  if (!running) return;

  ctx.clearRect(0, 0, 600, 600);

  drawRoad();
  drawLights();

  cars.forEach(updateCar);
  drawCars();

  checkCollision();

  cars = cars.filter(c =>
    c.x > -100 && c.x < 700 && c.y > -100 && c.y < 700
  );

  requestAnimationFrame(loop);
}

// 🚦 phase switching
setInterval(() => {
  if (running) phase = (phase + 1) % 2;
}, 3000);

// 🚗 spawn
setInterval(() => {
  if (running) spawnCar();
}, 600);

// ▶ start
function start() {
  cars = [];
  running = true;
  phase = 0;
  statusDiv.textContent = "Running (Realistic Lights)";
  loop();
}
</script>

</body>
</html>
