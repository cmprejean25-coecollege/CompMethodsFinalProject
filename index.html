<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Traffic Simulation - Lane Signals</title>

<style>
  body {
    margin: 0;
    background: #2c3e50;
    overflow: hidden;
  }

  canvas {
    display: block;
    margin: auto;
    background: #27ae60;
  }

  #uiOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(0,0,0,0.6);
    color: white;
    font-family: Arial;
  }

  #uiOverlay button {
    padding: 12px 24px;
    font-size: 18px;
    margin-top: 10px;
    cursor: pointer;
  }
</style>
</head>

<body>

<canvas id="simCanvas" width="800" height="600"></canvas>

<div id="uiOverlay">
  <h1>🚦 Traffic Simulation</h1>
  <p>Click play to start / restart</p>
  <button id="playBtn">▶ Play</button>
</div>

<script>
const canvas = document.getElementById("simCanvas");
const ctx = canvas.getContext("2d");

const overlay = document.getElementById("uiOverlay");
const playBtn = document.getElementById("playBtn");

const roadWidth = 120;

let lightState = "NS";
let timer = 0;

let running = false;

// ---------------- CONFIG ----------------
const TOTAL_CARS = 300;
const LANE_SPACING = 34;

const CELL_SIZE = 80;
const grid = new Map();

function cellKey(x, y) {
  return `${Math.floor(x / CELL_SIZE)},${Math.floor(y / CELL_SIZE)}`;
}

// ---------------- CAR ----------------
class Car {
  constructor(x, y, dx, dy) {
    this.x = x;
    this.y = y;
    this.dx = dx;
    this.dy = dy;
    this.speed = 1.6;
    this.width = 22;
    this.height = 12;
  }

  update(frontCars) {
    let canMove = true;

    // ---------------- INTERSECTION STOP-LINE LOGIC ----------------
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    const stopDistance = 70;
    const insideIntersection = 45;

    // Vertical traffic (north/south)
    if (this.dy !== 0) {
      const distToCenter = Math.abs(this.y - cy);

      const approachingStopLine = distToCenter < stopDistance;
      const alreadyInside = distToCenter < insideIntersection;

      if (approachingStopLine && !alreadyInside) {
        if (lightState === "EW") {
          canMove = false;
        }
      }
    }

    // Horizontal traffic (east/west)
    if (this.dx !== 0) {
      const distToCenter = Math.abs(this.x - cx);

      const approachingStopLine = distToCenter < stopDistance;
      const alreadyInside = distToCenter < insideIntersection;

      if (approachingStopLine && !alreadyInside) {
        if (lightState === "NS") {
          canMove = false;
        }
      }
    }

    // ---------------- spacing rule ----------------
    for (let other of frontCars) {
      let dist = this.dx !== 0
        ? Math.abs(other.x - this.x)
        : Math.abs(other.y - this.y);

      if (dist < 55) canMove = false;
    }

    if (canMove) {
      this.x += this.dx * this.speed;
      this.y += this.dy * this.speed;
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x + this.width/2, this.y + this.height/2);

    if (this.dx > 0) ctx.rotate(0);
    else if (this.dx < 0) ctx.rotate(Math.PI);
    else if (this.dy > 0) ctx.rotate(Math.PI/2);
    else if (this.dy < 0) ctx.rotate(-Math.PI/2);

    ctx.fillStyle = "#3498db";
    ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);

    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.moveTo(this.width/2 - 2, 0);
    ctx.lineTo(this.width/2 - 8, -4);
    ctx.lineTo(this.width/2 - 8, 4);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }
}

// ---------------- CARS ----------------
const cars = [];

function createQueues() {
  const perLane = Math.floor(TOTAL_CARS / 4);

  for (let i = 0; i < perLane; i++) {
    cars.push(new Car(-i * LANE_SPACING, canvas.height/2 - 30, 1, 0));
    cars.push(new Car(canvas.width + i * LANE_SPACING, canvas.height/2 + 20, -1, 0));
    cars.push(new Car(canvas.width/2 - 30, -i * LANE_SPACING, 0, 1));
    cars.push(new Car(canvas.width/2 + 20, canvas.height + i * LANE_SPACING, 0, -1));
  }
}

// ---------------- LIGHTS ----------------
function updateLights() {
  timer++;
  if (timer > 300) {
    lightState = (lightState === "NS") ? "EW" : "NS";
    timer = 0;
  }
}

// ---------------- ROAD ----------------
function drawRoads() {
  ctx.fillStyle = "#555";
  ctx.fillRect(0, canvas.height/2 - roadWidth/2, canvas.width, roadWidth);
  ctx.fillRect(canvas.width/2 - roadWidth/2, 0, roadWidth, canvas.height);
}

// ---------------- LIGHT VISUALS ----------------
function drawLights() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  const poleH = 60;
  const boxW = 16;
  const boxH = 40;

  function drawSignal(x, y, isNS) {
    const isGreen = (lightState === (isNS ? "NS" : "EW"));

    ctx.fillStyle = "#333";
    ctx.fillRect(x - 3, y - poleH, 6, poleH);

    ctx.fillStyle = "#222";
    ctx.fillRect(x - boxW/2, y - poleH - boxH, boxW, boxH);

    ctx.beginPath();
    ctx.fillStyle = isGreen ? "#2ecc71" : "#e74c3c";
    ctx.arc(x, y - poleH - boxH/2, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  drawSignal(cx - 30, cy - 110, true);
  drawSignal(cx + 30, cy + 110, true);
  drawSignal(cx - 110, cy + 30, false);
  drawSignal(cx + 110, cy - 30, false);
}

// ---------------- LOOP ----------------
function animate() {
  if (!running) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawRoads();
  drawLights();
  updateLights();

  grid.clear();

  for (let i = 0; i < cars.length; i++) {
    const c = cars[i];
    const key = cellKey(c.x, c.y);
    if (!grid.has(key)) grid.set(key, []);
    grid.get(key).push(i);
  }

  for (let i = 0; i < cars.length; i++) {
    let car = cars[i];
    let frontCars = [];

    const cx = Math.floor(car.x / CELL_SIZE);
    const cy = Math.floor(car.y / CELL_SIZE);

    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {

        const bucket = grid.get(`${cx + dx},${cy + dy}`);
        if (!bucket) continue;

        for (let j of bucket) {
          if (i === j) continue;

          let other = cars[j];

          const sameLane =
            (car.dx !== 0 && Math.abs(car.y - other.y) < 15) ||
            (car.dy !== 0 && Math.abs(car.x - other.x) < 15);

          if (!sameLane) continue;

          if (car.dx > 0 && other.x > car.x) frontCars.push(other);
          if (car.dx < 0 && other.x < car.x) frontCars.push(other);
          if (car.dy > 0 && other.y > car.y) frontCars.push(other);
          if (car.dy < 0 && other.y < car.y) frontCars.push(other);
        }
      }
    }

    car.update(frontCars);
    car.draw();
  }

  requestAnimationFrame(animate);
}

// ---------------- START ----------------
playBtn.addEventListener("click", () => {
  overlay.style.display = "none";

  cars.length = 0;
  grid.clear();

  lightState = "NS";
  timer = 0;

  createQueues();

  running = true;
  animate();
});
</script>

</body>
</html>
