<!DOCTYPE html>
<html>
<head>
<title>Fixed Cloverleaf Simulation v4</title>
<style>
  body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
  canvas { display: block; background: #27ae60; }
  #status { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; pointer-events: none; }
  b { color: #e74c3c; }
</style>
</head>
<body>

<div id="status">
  <b>Cloverleaf v4 (Path Correction)</b><br>
  300 Cars | Unified Lane Logic<br>
  Fixed "Ghost Road" & Path Alignment
</div>
<canvas id="sim"></canvas>

<script>
const canvas = document.getElementById("sim");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- CONSTANTS ---
const cx = canvas.width / 2;
const cy = canvas.height / 2;
const roadW = 50;
const loopR = 90;   
const rampDist = 200; // Point where ramp leaves main road
const lane = 15;      // Distance from center of road

// --- SHARED PATHING FUNCTIONS ---
// Ensures cars follow the exact curve drawn on screen
function getBezierPoint(t, p0, p1, p2) {
    const invT = 1 - t;
    return {
        x: invT * invT * p0.x + 2 * invT * t * p1.x + t * t * p2.x,
        y: invT * invT * p0.y + 2 * invT * t * p1.y + t * t * p2.y
    };
}

function createCurvePath(p0, p1, p2) {
    let pts = [];
    for(let i=0; i<=20; i++) pts.push(getBezierPoint(i/20, p0, p1, p2));
    return pts;
}

function createArcPath(centerX, centerY, radius, startA, endA) {
    let pts = [];
    let steps = 30;
    for(let i=0; i<=steps; i++) {
        let a = startA + (endA - startA) * (i/steps);
        pts.push({ x: centerX + Math.cos(a) * radius, y: centerY + Math.sin(a) * radius });
    }
    return pts;
}

// --- PATH GENERATOR ---
function generatePath() {
    let p = [];
    const directions = ['N', 'S', 'E', 'W'];
    const types = ['straight', 'right', 'loop'];
    let start = directions[Math.floor(Math.random() * 4)];
    let type = types[Math.floor(Math.random() * 3)];

    if (start === 'W') {
        if (type === 'straight') {
            p = [{x: -50, y: cy + lane}, {x: canvas.width + 50, y: cy + lane}];
        } else if (type === 'right') { // NW Ramp to South
            p.push({x: -50, y: cy + lane}, {x: cx - rampDist, y: cy + lane});
            p = p.concat(createCurvePath({x: cx - rampDist, y: cy + lane}, {x: cx - rampDist, y: cy + rampDist}, {x: cx - lane, y: cy + rampDist}));
            p.push({x: cx - lane, y: canvas.height + 50});
        } else { // Loop to North
            p.push({x: -50, y: cy + lane}, {x: cx + loopR, y: cy + lane});
            p = p.concat(createArcPath(cx + loopR, cy + loopR, loopR - lane, Math.PI * 1.5, Math.PI * 3.5));
            p.push({x: cx + lane, y: -50});
        }
    } else if (start === 'E') {
        if (type === 'straight') {
            p = [{x: canvas.width + 50, y: cy - lane}, {x: -50, y: cy - lane}];
        } else if (type === 'right') { // SE Ramp to North
            p.push({x: canvas.width + 50, y: cy - lane}, {x: cx + rampDist, y: cy - lane});
            p = p.concat(createCurvePath({x: cx + rampDist, y: cy - lane}, {x: cx + rampDist, y: cy - rampDist}, {x: cx + lane, y: cy - rampDist}));
            p.push({x: cx + lane, y: -50});
        } else { // Loop to South
            p.push({x: canvas.width + 50, y: cy - lane}, {x: cx - loopR, y: cy - lane});
            p = p.concat(createArcPath(cx - loopR, cy - loopR, loopR - lane, Math.PI * 0.5, Math.PI * 2.5));
            p.push({x: cx - lane, y: canvas.height + 50});
        }
    } else if (start === 'N') {
        if (type === 'straight') {
            p = [{x: cx - lane, y: -50}, {x: cx - lane, y: canvas.height + 50}];
        } else if (type === 'right') { // NE Ramp to West
            p.push({x: cx - lane, y: -50}, {x: cx - lane, y: cy - rampDist});
            p = p.concat(createCurvePath({x: cx - lane, y: cy - rampDist}, {x: cx - rampDist, y: cy - rampDist}, {x: cx - rampDist, y: cy - lane}));
            p.push({x: -50, y: cy - lane});
        } else { // Loop to East
            p.push({x: cx - lane, y: -50}, {x: cx - lane, y: cy + loopR});
            p = p.concat(createArcPath(cx - loopR, cy + loopR, loopR - lane, 0, Math.PI * 2));
            p.push({x: canvas.width + 50, y: cy + lane});
        }
    } else if (start === 'S') {
        if (type === 'straight') {
            p = [{x: cx + lane, y: canvas.height + 50}, {x: cx + lane, y: -50}];
        } else if (type === 'right') { // SW Ramp to East
            p.push({x: cx + lane, y: canvas.height + 50}, {x: cx + lane, y: cy + rampDist});
            p = p.concat(createCurvePath({x: cx + lane, y: cy + rampDist}, {x: cx + rampDist, y: cy + rampDist}, {x: cx + rampDist, y: cy + lane}));
            p.push({x: canvas.width + 50, y: cy + lane});
        } else { // Loop to West
            p.push({x: cx + lane, y: canvas.height + 50}, {x: cx + lane, y: cy - loopR});
            p = p.concat(createArcPath(cx + loopR, cy - loopR, loopR - lane, Math.PI, Math.PI * 3));
            p.push({x: -50, y: cy - lane});
        }
    }
    return p;
}

class Car {
    constructor() { this.respawn(true); }
    respawn(isInitial = false) {
        this.path = generatePath();
        this.index = isInitial ? Math.floor(Math.random() * (this.path.length - 1)) : 0;
        this.x = this.path[this.index].x;
        this.y = this.path[this.index].y;
        this.speed = 1.8 + Math.random() * 1.5;
        this.angle = 0;
    }
    update() {
        let target = this.path[this.index];
        if (!target) { this.respawn(); return; }
        let dx = target.x - this.x, dy = target.y - this.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 10) { 
            this.index++; 
        } else {
            this.angle = Math.atan2(dy, dx);
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
        }
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillStyle = "#c0392b";
        ctx.fillRect(-12, -6, 24, 12);
        ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
        ctx.fillRect(9, -5, 4, 3); ctx.fillRect(9, 2, 4, 3);
        ctx.fillStyle = "#500";
        ctx.fillRect(-12, -5, 2, 3); ctx.fillRect(-12, 2, 2, 3);
        ctx.restore();
    }
}

let cars = Array.from({length: 300}, () => new Car());

function drawBackground() {
    ctx.strokeStyle = "#444";
    ctx.lineWidth = roadW;
    ctx.lineCap = "butt";

    // 1. East-West Road (Single Clean Stroke)
    ctx.beginPath();
    ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy);
    ctx.stroke();

    // 2. Loops (Drawn from center points)
    ctx.beginPath();
    ctx.arc(cx - loopR, cy + loopR, loopR, 0, Math.PI * 2);
    ctx.arc(cx + loopR, cy - loopR, loopR, 0, Math.PI * 2);
    ctx.arc(cx + loopR, cy + loopR, loopR, 0, Math.PI * 2);
    ctx.arc(cx - loopR, cy - loopR, loopR, 0, Math.PI * 2);
    ctx.stroke();

    // 3. Outer Ramps (Using Exact Coordinate Logic)
    ctx.beginPath();
    // NW Exit to South
    ctx.moveTo(0, cy + lane); ctx.lineTo(cx - rampDist, cy + lane);
    ctx.quadraticCurveTo(cx - rampDist, cy + rampDist, cx - lane, cy + rampDist);
    ctx.lineTo(cx - lane, canvas.height);
    // SE Exit to North
    ctx.moveTo(canvas.width, cy - lane); ctx.lineTo(cx + rampDist, cy - lane);
    ctx.quadraticCurveTo(cx + rampDist, cy - rampDist, cx + lane, cy - rampDist);
    ctx.lineTo(cx + lane, 0);
    // NE Exit to West
    ctx.moveTo(cx - lane, 0); ctx.lineTo(cx - lane, cy - rampDist);
    ctx.quadraticCurveTo(cx - rampDist, cy - rampDist, cx - rampDist, cy - lane);
    ctx.lineTo(0, cy - lane);
    // SW Exit to East
    ctx.moveTo(cx + lane, canvas.height); ctx.lineTo(cx + lane, cy + rampDist);
    ctx.quadraticCurveTo(cx + rampDist, cy + rampDist, cx + rampDist, cy + lane);
    ctx.lineTo(canvas.width, cy + lane);
    ctx.stroke();

    // 4. North-South Bridge
    ctx.save();
    ctx.shadowBlur = 15; ctx.shadowColor = "black";
    ctx.strokeStyle = "#4d4d4d";
    ctx.beginPath();
    ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height);
    ctx.stroke();
    ctx.restore();
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground();
    cars.forEach(c => { c.update(); c.draw(); });
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
