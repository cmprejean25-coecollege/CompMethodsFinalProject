<!DOCTYPE html>
<html>
<head>
<title>Full Cloverleaf Interchange Simulation</title>
<style>
  body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
  canvas { display: block; background: #27ae60; }
  #status { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; pointer-events: none; }
  b { color: #2ecc71; }
</style>
</head>
<body>

<div id="status">
  <b>Full Cloverleaf Interchange</b><br>
  300 Cars | Waypoint Navigation<br>
  Continuous Flow (No Lights)
</div>
<canvas id="sim"></canvas>

<script>
const canvas = document.getElementById("sim");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const cx = canvas.width / 2;
const cy = canvas.height / 2;
const roadW = 50;
const loopR = 80;   // Radius of the clover loops
const rampR = 180;  // Radius of the outer ramps

// --- MATH HELPERS ---
function createArc(centerX, centerY, radius, startAngle, endAngle, clockwise) {
    let points = [];
    let steps = 15; 
    let diff = endAngle - startAngle;
    for (let i = 0; i <= steps; i++) {
        let a = startAngle + (diff * (i / steps));
        points.push({ x: centerX + Math.cos(a) * radius, y: centerY + Math.sin(a) * radius });
    }
    return points;
}

// --- PATH GENERATOR ---
function generatePath() {
    let p = [];
    const directions = ['N', 'S', 'E', 'W'];
    const types = ['straight', 'right', 'loop'];
    
    let start = directions[Math.floor(Math.random() * 4)];
    let type = types[Math.floor(Math.random() * 3)];

    // Offsets to keep cars in lanes (right-hand traffic)
    const lane = 15;

    if (start === 'W') { // Coming from Left
        if (type === 'straight') {
            for(let x = -100; x < canvas.width + 100; x += 100) p.push({x: x, y: cy + lane});
        } else if (type === 'right') {
            for(let x = -100; x < cx - rampR; x += 50) p.push({x: x, y: cy + lane});
            p = p.concat(createArc(cx - rampR, cy + rampR, rampR - lane, Math.PI * 1.5, Math.PI * 2, true));
            for(let y = cy + rampR; y < canvas.height + 100; y += 50) p.push({x: cx - lane, y: y});
        } else { // Clover Loop (Left Turn)
            for(let x = -100; x < cx + loopR; x += 50) p.push({x: x, y: cy + lane});
            p = p.concat(createArc(cx + loopR, cy + loopR, loopR - lane, Math.PI * 1.5, Math.PI * 3.5, true));
            for(let y = cy + loopR; y > -100; y -= 50) p.push({x: cx + lane, y: y});
        }
    } 
    else if (start === 'E') { // Coming from Right
        if (type === 'straight') {
            for(let x = canvas.width + 100; x > -100; x -= 100) p.push({x: x, y: cy - lane});
        } else if (type === 'right') {
            for(let x = canvas.width + 100; x > cx + rampR; x -= 50) p.push({x: x, y: cy - lane});
            p = p.concat(createArc(cx + rampR, cy - rampR, rampR - lane, Math.PI * 0.5, Math.PI, true));
            for(let y = cy - rampR; y > -100; y -= 50) p.push({x: cx + lane, y: y});
        } else {
            for(let x = canvas.width + 100; x > cx - loopR; x -= 50) p.push({x: x, y: cy - lane});
            p = p.concat(createArc(cx - loopR, cy - loopR, loopR - lane, Math.PI * 0.5, Math.PI * 2.5, true));
            for(let y = cy - loopR; y < canvas.height + 100; y += 50) p.push({x: cx - lane, y: y});
        }
    }
    else if (start === 'N') { // Coming from Top
        if (type === 'straight') {
            for(let y = -100; y < canvas.height + 100; y += 100) p.push({x: cx - lane, y: y});
        } else if (type === 'right') {
            for(let y = -100; y < cy - rampR; y += 50) p.push({x: cx - lane, y: y});
            p = p.concat(createArc(cx - rampR, cy - rampR, rampR - lane, 0, Math.PI * 0.5, true));
            for(let x = cx - rampR; x > -100; x -= 50) p.push({x: x, y: cy - lane});
        } else {
            for(let y = -100; y < cy + loopR; y += 50) p.push({x: cx - lane, y: y});
            p = p.concat(createArc(cx - loopR, cy + loopR, loopR - lane, 0, Math.PI * 2, true));
            for(let x = cx - loopR; x < canvas.width + 100; x += 50) p.push({x: x, y: cy + lane});
        }
    }
    else if (start === 'S') { // Coming from Bottom
        if (type === 'straight') {
            for(let y = canvas.height + 100; y > -100; y -= 100) p.push({x: cx + lane, y: y});
        } else if (type === 'right') {
            for(let y = canvas.height + 100; y > cy + rampR; y -= 50) p.push({x: cx + lane, y: y});
            p = p.concat(createArc(cx + rampR, cy + rampR, rampR - lane, Math.PI, Math.PI * 1.5, true));
            for(let x = cx + rampR; x < canvas.width + 100; x += 50) p.push({x: x, y: cy + lane});
        } else {
            for(let y = canvas.height + 100; y > cy - loopR; y -= 50) p.push({x: cx + lane, y: y});
            p = p.concat(createArc(cx + loopR, cy - loopR, loopR - lane, Math.PI, Math.PI * 3, true));
            for(let x = cx + loopR; x > -100; x -= 50) p.push({x: x, y: cy - lane});
        }
    }

    return p;
}

class Car {
    constructor() { this.respawn(true); }
    respawn(isInitial = false) {
        this.path = generatePath();
        this.index = isInitial ? Math.floor(Math.random() * (this.path.length - 1)) : 0;
        this.x = this.path[this.index].x;
        this.y = this.path[this.index].y;
        this.speed = 1.5 + Math.random() * 2;
        this.color = `hsl(${Math.random() * 360}, 60%, 60%)`;
        this.angle = 0;
    }
    update() {
        let target = this.path[this.index];
        if (!target) { this.respawn(); return; }
        let dx = target.x - this.x, dy = target.y - this.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 8) { this.index++; } 
        else {
            this.angle = Math.atan2(dy, dx);
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
        }
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillStyle = this.color;
        ctx.fillRect(-12, -6, 24, 12);
        ctx.restore();
    }
}

let cars = Array.from({length: 120}, () => new Car());

function drawBackground() {
    ctx.strokeStyle = "#444";
    ctx.lineWidth = roadW;
    
    // Draw Loops
    ctx.beginPath();
    ctx.arc(cx - loopR, cy + loopR, loopR, 0, Math.PI * 2);
    ctx.arc(cx + loopR, cy - loopR, loopR, 0, Math.PI * 2);
    ctx.arc(cx + loopR, cy + loopR, loopR, 0, Math.PI * 2);
    ctx.arc(cx - loopR, cy - loopR, loopR, 0, Math.PI * 2);
    ctx.stroke();

    // Draw Ramps
    ctx.beginPath();
    ctx.arc(cx - rampR, cy + rampR, rampR, Math.PI * 1.5, Math.PI * 2);
    ctx.arc(cx + rampR, cy - rampR, rampR, Math.PI * 0.5, Math.PI);
    ctx.arc(cx - rampR, cy - rampR, rampR, 0, Math.PI * 0.5);
    ctx.arc(cx + rampR, cy + rampR, rampR, Math.PI, Math.PI * 1.5);
    ctx.stroke();

    // East-West Main Road
    ctx.beginPath();
    ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy);
    ctx.stroke();

    // North-South Bridge (with shadow)
    ctx.save();
    ctx.shadowBlur = 15; ctx.shadowColor = "black";
    ctx.strokeStyle = "#555";
    ctx.beginPath();
    ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height);
    ctx.stroke();
    ctx.restore();
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground();
    cars.forEach(c => { c.update(); c.draw(); });
    requestAnimationFrame(loop);
}

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

loop();
</script>
</body>
</html>
