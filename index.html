<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Traffic Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; background: #333; }
        #stats { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="stats">Cars: 300 | Intersection: Active</div>
    <canvas id="sim"></canvas>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');

let width, height;
const cars = [];
const carCount = 300;
const laneWidth = 40;
const intersectionSize = laneWidth * 4;

// Traffic Light State
let lightState = "NS_GREEN"; // NS_GREEN, NS_YELLOW, EW_GREEN, EW_YELLOW
let timer = 0;

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();

class Car {
    constructor() {
        this.reset();
    }

    reset() {
        // Randomly pick a starting direction: 0: North, 1: South, 2: East, 3: West
        this.dir = Math.floor(Math.random() * 4);
        this.speed = 0;
        this.maxSpeed = 2 + Math.random() * 2;
        this.accel = 0.1;
        this.length = 20;
        this.width = 12;
        this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
        this.turning = Math.random() < 0.3 ? (Math.random() < 0.5 ? 'left' : 'right') : 'straight';
        this.hasTurned = false;

        const midX = width / 2;
        const midY = height / 2;

        if (this.dir === 0) { // Coming from North going South
            this.x = midX + (Math.random() < 0.5 ? laneWidth / 2 : laneWidth * 1.5);
            this.y = -Math.random() * 2000;
            this.angle = Math.PI / 2;
        } else if (this.dir === 1) { // Coming from South going North
            this.x = midX - (Math.random() < 0.5 ? laneWidth / 2 : laneWidth * 1.5);
            this.y = height + Math.random() * 2000;
            this.angle = -Math.PI / 2;
        } else if (this.dir === 2) { // Coming from East going West
            this.x = width + Math.random() * 2000;
            this.y = midY + (Math.random() < 0.5 ? laneWidth / 2 : laneWidth * 1.5);
            this.angle = Math.PI;
        } else { // Coming from West going East
            this.x = -Math.random() * 2000;
            this.y = midY - (Math.random() < 0.5 ? laneWidth / 2 : laneWidth * 1.5);
            this.angle = 0;
        }
    }

    update() {
        let sensorDist = 50;
        let canGo = true;

        // 1. Traffic Light Logic
        const midX = width / 2;
        const midY = height / 2;
        const stopLine = intersectionSize / 2 + 10;

        if (this.dir === 0 && this.y < midY - stopLine && this.y > midY - stopLine - 20) {
            if (lightState !== "NS_GREEN") canGo = false;
        } else if (this.dir === 1 && this.y > midY + stopLine && this.y < midY + stopLine + 20) {
            if (lightState !== "NS_GREEN") canGo = false;
        } else if (this.dir === 2 && this.x > midX + stopLine && this.x < midX + stopLine + 20) {
            if (lightState !== "EW_GREEN") canGo = false;
        } else if (this.dir === 3 && this.x < midX - stopLine && this.x > midX - stopLine - 20) {
            if (lightState !== "EW_GREEN") canGo = false;
        }

        // 2. Collision Detection (Simple proximity to car in front)
        cars.forEach(other => {
            if (other === this) return;
            let dx = other.x - this.x;
            let dy = other.y - this.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            // Check if car is ahead in the same path
            if (dist < 40) {
                let dot = (dx * Math.cos(this.angle) + dy * Math.sin(this.angle)) / dist;
                if (dot > 0.8) canGo = false; 
            }
        });

        // Speed control
        if (canGo) {
            this.speed = Math.min(this.speed + this.accel, this.maxSpeed);
        } else {
            this.speed = Math.max(this.speed - this.accel * 2, 0);
        }

        // 3. Turning Logic in Intersection
        const inIntersection = Math.abs(this.x - midX) < 20 && Math.abs(this.y - midY) < 20;
        if (inIntersection && !this.hasTurned && this.turning !== 'straight') {
            if (this.turning === 'left') this.angle -= Math.PI / 2;
            if (this.turning === 'right') this.angle += Math.PI / 2;
            this.hasTurned = true;
        }

        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        // Reset if off screen
        if (this.x < -2100 || this.x > width + 2100 || this.y < -2100 || this.y > height + 2100) {
            this.reset();
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.length/2, -this.width/2, this.length, this.width);
        // Headlights
        ctx.fillStyle = "white";
        ctx.fillRect(this.length/2 - 2, -this.width/2, 2, 2);
        ctx.fillRect(this.length/2 - 2, this.width/2 - 2, 2, 2);
        ctx.restore();
    }
}

// Initialize Cars
for (let i = 0; i < carCount; i++) {
    cars.push(new Car());
}

function drawRoads() {
    const midX = width / 2;
    const midY = height / 2;

    ctx.fillStyle = "#444";
    // Horizontal Road
    ctx.fillRect(0, midY - laneWidth * 2, width, laneWidth * 4);
    // Vertical Road
    ctx.fillRect(midX - laneWidth * 2, 0, laneWidth * 4, height);

    // Markings
    ctx.strokeStyle = "#fff";
    ctx.setLineDash([20, 20]);
    ctx.beginPath();
    // Horizontal center
    ctx.moveTo(0, midY); ctx.lineTo(width, midY);
    // Vertical center
    ctx.moveTo(midX, 0); ctx.lineTo(midX, height);
    ctx.stroke();
    ctx.setLineDash([]);
    
    // Draw Traffic Lights
    drawLight(midX - 100, midY - 100, lightState === "NS_GREEN", lightState === "NS_YELLOW", lightState !== "NS_GREEN" && lightState !== "NS_YELLOW");
    drawLight(midX + 80, midY + 80, lightState === "NS_GREEN", lightState === "NS_YELLOW", lightState !== "NS_GREEN" && lightState !== "NS_YELLOW");
    drawLight(midX + 80, midY - 100, lightState === "EW_GREEN", lightState === "EW_YELLOW", lightState !== "EW_GREEN" && lightState !== "EW_YELLOW");
    drawLight(midX - 100, midY + 80, lightState === "EW_GREEN", lightState === "EW_YELLOW", lightState !== "EW_GREEN" && lightState !== "EW_YELLOW");
}

function drawLight(x, y, g, yel, r) {
    ctx.fillStyle = "#000";
    ctx.fillRect(x, y, 20, 50);
    ctx.fillStyle = r ? "red" : "#300";
    ctx.beginPath(); ctx.arc(x+10, y+10, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = yel ? "yellow" : "#330";
    ctx.beginPath(); ctx.arc(x+10, y+25, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = g ? "#0f0" : "#030";
    ctx.beginPath(); ctx.arc(x+10, y+40, 6, 0, Math.PI*2); ctx.fill();
}

function loop() {
    ctx.clearRect(0, 0, width, height);
    
    // Update Light Logic
    timer++;
    if (timer < 300) lightState = "NS_GREEN";
    else if (timer < 400) lightState = "NS_YELLOW";
    else if (timer < 700) lightState = "EW_GREEN";
    else if (timer < 800) lightState = "EW_YELLOW";
    else timer = 0;

    drawRoads();

    cars.forEach(car => {
        car.update();
        car.draw();
    });

    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
