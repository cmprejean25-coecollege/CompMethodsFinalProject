<!DOCTYPE html>
<html>
<head>
<title>Cloverleaf Interchange - Final Working Version</title>
<style>
  body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
  canvas { display: block; background: #27ae60; }
  #status { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
</style>
</head>
<body>

<div id="status">Status: Running...</div>
<canvas id="sim"></canvas>

<script>
const canvas = document.getElementById("sim");
const ctx = canvas.getContext("2d");

// Responsive Fullscreen
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const cx = canvas.width / 2;
const cy = canvas.height / 2;
const roadW = 50;

// Helper: Generate Smooth Arcs for Loops
function createArc(startX, startY, radius, startAngle, endAngle, clockwise) {
    let points = [];
    let step = 0.1;
    if (clockwise) {
        for (let a = startAngle; a < endAngle; a += step) {
            points.push({ x: startX + Math.cos(a) * radius, y: startY + Math.sin(a) * radius });
        }
    } else {
        for (let a = startAngle; a > endAngle; a -= step) {
            points.push({ x: startX + Math.cos(a) * radius, y: startY + Math.sin(a) * radius });
        }
    }
    return points;
}

// Generate Paths (Straight, Right Turn, and Clover Loop)
function generatePath() {
    let type = Math.random();
    let p = [];
    
    if (type < 0.4) { // Straight Path (East to West)
        for(let i=-100; i < canvas.width + 100; i+=50) p.push({x: i, y: cy + 15});
    } else if (type < 0.7) { // Right Turn Ramp
        for(let i=-100; i < cx - 150; i+=50) p.push({x: i, y: cy + 15});
        p = p.concat(createArc(cx - 150, cy + 150, 135, Math.PI * 1.5, Math.PI * 2, true));
        for(let i=cy + 150; i < canvas.height + 100; i+=50) p.push({x: cx - 15, y: i});
    } else { // The Clover Loop (Left Turn via 270-degree loop)
        for(let i=-100; i < cx + 100; i+=50) p.push({x: i, y: cy + 15});
        p = p.concat(createArc(cx + 100, cy + 100, 85, Math.PI * 1.5, Math.PI * 3.5, true));
        for(let i=cy + 100; i > -100; i-=50) p.push({x: cx + 15, y: i});
    }
    return p;
}

class Car {
    constructor() {
        this.respawn();
    }
    respawn() {
        this.path = generatePath();
        this.index = 0;
        this.x = this.path[0].x;
        this.y = this.path[0].y;
        this.speed = 2 + Math.random() * 2;
        this.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
        this.angle = 0;
    }
    update() {
        let target = this.path[this.index];
        if (!target) {
            this.respawn();
            return;
        }
        let dx = target.x - this.x;
        let dy = target.y - this.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < 5) {
            this.index++;
        } else {
            this.angle = Math.atan2(dy, dx);
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
        }
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillStyle = this.color;
        ctx.fillRect(-12, -6, 24, 12);
        ctx.fillStyle = "white"; // Headlights
        ctx.fillRect(10, -5, 4, 2);
        ctx.fillRect(10, 3, 4, 2);
        ctx.restore();
    }
}

let cars = Array.from({length: 50}, () => new Car());

function drawRoads() {
    ctx.strokeStyle = "#444";
    ctx.lineWidth = roadW;
    
    // Bottom Road (East-West)
    ctx.beginPath();
    ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy);
    ctx.stroke();

    // Ramps & Loops
    ctx.beginPath();
    ctx.arc(cx - 150, cy + 150, 135, Math.PI * 1.5, Math.PI * 2); // Sample Ramp
    ctx.arc(cx + 100, cy + 100, 85, 0, Math.PI * 2); // Sample Loop
    ctx.stroke();

    // Bridge Shadow (N-S Road)
    ctx.shadowBlur = 15;
    ctx.shadowColor = "black";
    ctx.strokeStyle = "#555";
    ctx.beginPath();
    ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height);
    ctx.stroke();
    ctx.shadowBlur = 0; // Reset
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawRoads();
    cars.forEach(c => {
        c.update();
        c.draw();
    });
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
