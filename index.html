<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authentic Cloverleaf Interchange (v5.0)</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #225a27; /* Matching the darker green grass */ box-shadow: inset 0 0 100px rgba(0,0,0,0.5); }
        .hud { position: absolute; top: 15px; left: 15px; color: white; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 6px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="hud">
        <b>Highway Interchange v5.0</b><br>
        • Dual Carriageways with Medians<br>
        • Layered Bridges<br>
        • Unified Directional Fleet
    </div>
    <canvas id="sim"></canvas>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');
let cars = [];

// Infrastructure configuration
const config = {
    carriagewayW: 32,    // Width of one side of the highway
    medianW: 10,         // Width of the central grass median
    loopR: 85,           // Radius of cloverleaf loops
    rampOffset: 300,     // Distance from center where outer ramps merge/diverge
    loopOffset: 120,     // Distance from center where inner loops merge/diverge
    center: { x: 0, y: 0 }
};

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    config.center.x = canvas.width / 2;
    config.center.y = canvas.height / 2;
}
window.addEventListener('resize', resize);
resize();

class Car {
    constructor(directionIndex) {
        this.dir = directionIndex; // 0:N, 1:E, 2:S, 3:W
        this.progress = 0;
        this.speed = 3 + Math.random() * 2.5;
        this.color = "#ecf0f1"; // fleet color
        this.x = 0; this.y = 0; this.angle = 0;
        
        const r = Math.random();
        this.type = r < 0.2 ? 'right' : (r < 0.5 ? 'loop' : 'straight');
        // E-W road (1,3) goes over N-S road (0,2) based on reference image shadow
        this.isOverpass = (this.dir === 1 || this.dir === 3);
    }

    update() {
        const oldX = this.x; const oldY = this.y;
        this.progress += this.speed;
        
        // Target lane offset: lane offset (16) + half median (5) = 21
        let tx = (config.carriagewayW/2 + config.medianW/2);
        let ty = 600 - this.progress;

        if (this.type === 'right') {
            const startExit = 600 - config.rampOffset;
            if (this.progress > startExit) {
                let t = (this.progress - startExit) * 0.005;
                tx = 21 + Math.pow(t * 180, 1.1);
                ty = config.rampOffset - (t * 120);
            }
        } else if (this.type === 'loop') {
            const startLoop = 600 - config.loopOffset;
            if (this.progress > startLoop && this.progress < 1100) {
                let a = (this.progress - startLoop) * 0.013;
                tx = (21 + config.loopR) - Math.cos(a) * config.loopR;
                ty = (config.loopOffset - config.loopR) - Math.sin(a) * config.loopR;
            } else if (this.progress >= 1100) {
                tx = 21 + (this.progress - 1100);
                ty = -(config.loopR - 20);
            }
        }

        const rot = (this.dir * Math.PI) / 2;
        this.x = config.center.x + (tx * Math.cos(rot) - ty * Math.sin(rot));
        this.y = config.center.y + (tx * Math.sin(rot) + ty * Math.cos(rot));
        this.angle = Math.atan2(this.y - oldY, this.x - oldX) + Math.PI/2;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillStyle = this.color;
        ctx.fillRect(-6, -10, 12, 20); // Body
        ctx.fillStyle = "#2c3e50"; ctx.fillRect(-4, -6, 8, 7); // Windshield
        // Directional lights
        ctx.shadowBlur = 8; ctx.shadowColor = "#ffff00"; ctx.fillStyle = "#ffff00";
        ctx.fillRect(-5, -11, 3, 2); ctx.fillRect(2, -11, 3, 2);
        ctx.shadowBlur = 4; ctx.shadowColor = "#ff0000"; ctx.fillStyle = "#ff0000";
        ctx.fillRect(-5, 9, 3, 1); ctx.fillRect(2, 9, 3, 1);
        ctx.restore();
        ctx.shadowBlur = 0;
    }
}

function drawDualHighway(isVertical, width, center) {
    ctx.strokeStyle = "#3d3d3d"; // Dark asphalt
    ctx.lineWidth = width;
    const offset = width/2 + config.medianW/2;
    
    ctx.beginPath();
    if (isVertical) {
        ctx.moveTo(center.x - offset, 0); ctx.lineTo(center.x - offset, canvas.height);
        ctx.moveTo(center.x + offset, 0); ctx.lineTo(center.x + offset, canvas.height);
    } else {
        ctx.moveTo(0, center.y - offset); ctx.lineTo(canvas.width, center.y - offset);
        ctx.moveTo(0, center.y + offset); ctx.lineTo(canvas.width, center.y + offset);
    }
    ctx.stroke();
    
    // Add white lane markings
    ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 1.5; ctx.setLineDash([15, 20]);
    ctx.stroke();
    ctx.setLineDash([]);
}

function drawRampsAndLoops(center) {
    const { carriagewayW, medianW, loopR, rampOffset, loopOffset } = config;
    ctx.strokeStyle = "#3d3d3d";
    const roadOffset = carriagewayW/2 + medianW/2;

    // Outer Ramps (The large quadratic arcs at the corners)
    ctx.lineWidth = 30; // High speed ramps are slightly wider than loops
    for (let i = 0; i < 4; i++) {
        ctx.save(); ctx.translate(center.x, center.y); ctx.rotate(i * Math.PI/2);
        ctx.beginPath();
        ctx.moveTo(roadOffset, rampOffset);
        ctx.quadraticCurveTo(rampOffset, rampOffset, rampOffset, roadOffset);
        ctx.stroke(); ctx.restore();
    }

    // Inner Loops (Clover Leaves)
    ctx.lineWidth = 26; // Transition loops are typically tighter/narrower
    for (let i = 0; i < 4; i++) {
        ctx.save(); ctx.translate(center.x, center.y); ctx.rotate(i * Math.PI/2);
        ctx.beginPath();
        ctx.arc(roadOffset + loopR, loopOffset - loopR, loopR, 0.5 * Math.PI, 1.65 * Math.PI);
        ctx.stroke(); ctx.restore();
    }
}

function animate() {
    ctx.fillStyle = "#225a27"; // Dark Green Grass
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Layer 1: Bottom Road (N-S)
    drawDualHighway(true, config.carriagewayW, config.center);
    // Layer 2: All ramps and loops
    drawRampsAndLoops(config.center);
    // Layer 3: Top Road (E-W Bridge)
    drawDualHighway(false, config.carriagewayW, config.center);

    // Dynamic Fleet
    if (Math.random() < 0.08 && cars.length < 50) {
        cars.push(new Car(Math.floor(Math.random() * 4)));
    }

    // Ensure cars on bridge are drawn last (over cars on the loops/underpass)
    cars.sort((a, b) => a.isOverpass - b.isOverpass);

    for (let i = cars.length - 1; i >= 0; i--) {
        cars[i].update();
        cars[i].draw();
        // Remove if far off screen
        if (Math.abs(cars[i].x - config.center.x) > 1000 || Math.abs(cars[i].y - config.center.y) > 1000) {
            cars.splice(i, 1);
        }
    }
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
