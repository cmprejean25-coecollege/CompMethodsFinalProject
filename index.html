<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentic Cloverleaf Highway</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; overflow: hidden; }
        canvas { background: #1b5e20; box-shadow: inset 0 0 100px rgba(0,0,0,0.5); }
        .hud { position: absolute; top: 20px; left: 20px; color: #fff; background: rgba(0,0,0,0.7); padding: 15px; border-left: 4px solid #f1c40f; pointer-events: none; }
    </style>
</head>
<body>
    <div class="hud">
        <b>Engineering Specs:</b><br>
        • Inner Loops: Left-turn transitions<br>
        • Outer Ramps: High-speed right exits<br>
        • Fleet: Standardized with directional LEDs
    </div>
    <canvas id="simCanvas"></canvas>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
let cars = [];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const center = { x: canvas.width/2, y: canvas.height/2 };
const roadW = 70;      
const loopR = 80;      
const rampExit = 280;  // How far out the right-turn ramp starts
const loopExit = 120;  // How far out the clover loop starts

class Car {
    constructor(lane) {
        this.lane = lane; // 0:N, 1:E, 2:S, 3:W
        const r = Math.random();
        this.type = r < 0.2 ? 'right' : (r < 0.5 ? 'loop' : 'straight');
        this.speed = 2.5 + Math.random() * 2;
        this.progress = 0;
        this.x = 0; this.y = 0; this.angle = 0;
    }

    update() {
        const oldX = this.x; const oldY = this.y;
        this.progress += this.speed;
        
        let tx = 18; // Lane offset
        let ty = 600 - this.progress;

        if (this.type === 'right') {
            // High-speed outer ramp
            if (this.progress > (600 - rampExit)) {
                let t = (this.progress - (600 - rampExit)) * 0.006;
                tx = 18 + Math.pow(t * 150, 1.2);
                ty = rampExit - (t * 100);
            }
        } else if (this.type === 'loop') {
            // Inner cloverleaf loop
            if (this.progress > (600 - loopExit) && this.progress < 1050) {
                let a = (this.progress - (600 - loopExit)) * 0.012;
                tx = (18 + loopR) - Math.cos(a) * loopR;
                ty = (loopExit - loopR) - Math.sin(a) * loopR;
            } else if (this.progress >= 1050) {
                tx = 18 + (this.progress - 1050);
                ty = -(loopR - 20);
            }
        }

        const rot = (this.lane * Math.PI) / 2;
        this.x = center.x + (tx * Math.cos(rot) - ty * Math.sin(rot));
        this.y = center.y + (tx * Math.sin(rot) + ty * Math.cos(rot));
        this.angle = Math.atan2(this.y - oldY, this.x - oldX) + Math.PI/2;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        
        // Body
        ctx.fillStyle = "#dfe6e9";
        ctx.fillRect(-6, -10, 12, 20);
        ctx.fillStyle = "#2d3436"; // Glass
        ctx.fillRect(-4, -6, 8, 7);
        
        // Headlights
        ctx.fillStyle = "#ffff00";
        ctx.shadowBlur = 10; ctx.shadowColor = "yellow";
        ctx.fillRect(-5, -11, 3, 2); ctx.fillRect(2, -11, 3, 2);
        
        // Brake Lights
        ctx.shadowBlur = 5; ctx.shadowColor = "red";
        ctx.fillStyle = "#ff0000";
        ctx.fillRect(-5, 9, 3, 1); ctx.fillRect(2, 9, 3, 1);
        
        ctx.restore();
        ctx.shadowBlur = 0;
    }
}

function drawRoads() {
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#333";

    // 1. Outer Ramps (The sweeping right turns at the edges)
    ctx.lineWidth = 40;
    for (let i = 0; i < 4; i++) {
        ctx.save();
        ctx.translate(center.x, center.y);
        ctx.rotate(i * Math.PI/2);
        ctx.beginPath();
        ctx.moveTo(18, rampExit);
        ctx.bezierCurveTo(80, rampExit, rampExit, 80, rampExit, 18);
        ctx.stroke();
        ctx.restore();
    }

    // 2. Inner Loops (The 4 circles in the center)
    for (let i = 0; i < 4; i++) {
        ctx.save();
        ctx.translate(center.x, center.y);
        ctx.rotate(i * Math.PI/2);
        ctx.beginPath();
        ctx.arc(18 + loopR, loopExit - loopR, loopR, 0.5 * Math.PI, 1.6 * Math.PI);
        ctx.stroke();
        ctx.restore();
    }

    // 3. Main Through-ways
    ctx.lineWidth = roadW;
    ctx.beginPath();
    ctx.moveTo(center.x, 0); ctx.lineTo(center.x, canvas.height);
    ctx.moveTo(0, center.y); ctx.lineTo(canvas.width, center.y);
    ctx.stroke();

    // 4. Paint Markings
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.lineWidth = 2;
    ctx.setLineDash([15, 20]);
    ctx.beginPath();
    ctx.moveTo(center.x, 0); ctx.lineTo(center.x, canvas.height);
    ctx.moveTo(0, center.y); ctx.lineTo(canvas.width, center.y);
    ctx.stroke();
    ctx.setLineDash([]);
}

function animate() {
    ctx.fillStyle = "#1b5e20"; // Grass
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    drawRoads();

    if (Math.random() < 0.06 && cars.length < 40) {
        cars.push(new Car(Math.floor(Math.random() * 4)));
    }

    for (let i = cars.length - 1; i >= 0; i--) {
        cars[i].update();
        cars[i].draw();
        if (Math.abs(cars[i].x - center.x) > 1000 || Math.abs(cars[i].y - center.y) > 1000) {
            cars.splice(i, 1);
        }
    }
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
