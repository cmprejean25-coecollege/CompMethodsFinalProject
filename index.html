<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Traffic Simulation - 300 Cars & Turns</title>
<style>
  body { margin: 0; background: #2c3e50; overflow: hidden; font-family: sans-serif; }
  canvas { display: block; margin: auto; background: #27ae60; }
  #uiOverlay, #crashOverlay, #winOverlay {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; flex-direction: column; color: white; pointer-events: none; text-align: center;
  }
  #uiOverlay { background: rgba(0,0,0,0.7); pointer-events: all; }
  #crashOverlay { display: none; background: rgba(200,0,0,0.75); pointer-events: all; }
  #winOverlay { display: none; background: rgba(39, 174, 96, 0.9); pointer-events: all; }
  button { padding: 15px 30px; font-size: 20px; cursor: pointer; border: none; border-radius: 5px; background: white; color: #333; font-weight: bold; }
  h1 { margin-bottom: 5px; }
</style>
</head>
<body>

<canvas id="simCanvas" width="800" height="600"></canvas>

<div id="uiOverlay">
  <h1>🚦 Traffic Simulation</h1>
  <p>300 Cars | Turning Logic | Buffer Clearing</p>
  <button onclick="reset()">START SIMULATION</button>
</div>

<div id="crashOverlay">
  <h1>🚨 COLLISION DETECTED</h1>
  <button onclick="reset()">RESTART</button>
</div>

<div id="winOverlay">
  <h1>🏆 MISSION ACCOMPLISHED</h1>
  <p>All 300 cars passed safely.</p>
  <button onclick="reset()">PLAY AGAIN</button>
</div>

<script>
const canvas = document.getElementById("simCanvas");
const ctx = canvas.getContext("2d");
const roadWidth = 120;
let running = false;
let cars = [];
let carsFinished = 0;

// Light System
let lightState = "NS"; 
let timer = 0;
const GREEN_TIME = 220;
const BUFFER_TIME = 100;
let nextPhase = "EW";

class Car {
  constructor(x, y, dx, dy, color) {
    this.x = x; this.y = y; 
    this.dx = dx; this.dy = dy;
    this.speed = 2.2;
    this.width = 22; this.height = 12;
    this.color = color;
    this.crossed = false;
    this.finished = false;
    // Turn choice: 0=Straight, 1=Left, 2=Right
    this.turnIntent = Math.floor(Math.random() * 3); 
  }

  update(frontCar) {
    if (this.finished) return;

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    let canMove = true;

    // 1. Follow distance
    if (frontCar) {
      let d = Math.hypot(this.x - frontCar.x, this.y - frontCar.y);
      if (d < 45) canMove = false;
    }

    // 2. Traffic Light Logic
    if (!this.crossed) {
        const isNS = (this.dy !== 0);
        const distToCenter = Math.hypot(this.x - cx, this.y - cy);
        const green = isNS ? (lightState === "NS") : (lightState === "EW");
        // Stop at the edge of the intersection if light is red
        if (!green && distToCenter < 100 && distToCenter > 60) canMove = false;
    }

    if (canMove) {
      // 3. Turning Logic (Triggered at center)
      if (!this.crossed && Math.abs(this.x - cx) < 5 && Math.abs(this.y - cy) < 5) {
        if (this.turnIntent === 1) { // Left
            let temp = this.dx; this.dx = this.dy; this.dy = -temp;
        } else if (this.turnIntent === 2) { // Right
            let temp = this.dx; this.dx = -this.dy; this.dy = temp;
        }
        this.crossed = true;
      }

      this.x += this.dx * this.speed;
      this.y += this.dy * this.speed;

      // 4. Finish Logic
      if (this.x < -50 || this.x > canvas.width + 50 || this.y < -50 || this.y > canvas.height + 50) {
        this.finished = true;
        carsFinished++;
      }
    }
  }

  draw() {
    if (this.finished) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    // Rotate car based on current direction
    const angle = Math.atan2(this.dy, this.dx);
    ctx.rotate(angle);
    
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.width/2, -this.height/2, this.width, this.height);
    
    // Windows
    ctx.fillStyle = "rgba(255,255,255,0.3)";
    ctx.fillRect(0, -this.height/2 + 2, 5, this.height - 4);
    
    // Headlights
    ctx.fillStyle = "white";
    ctx.fillRect(this.width/2 - 2, -this.height/2, 3, 3);
    ctx.fillRect(this.width/2 - 2, this.height/2 - 3, 3, 3);
    ctx.restore();
  }
}

function updateLights() {
  timer++;
  if ((lightState === "NS" || lightState === "EW") && timer > GREEN_TIME) {
    nextPhase = (lightState === "NS") ? "EW" : "NS";
    lightState = "RED_ALL";
    timer = 0;
  } else if (lightState === "RED_ALL" && timer > BUFFER_TIME) {
    lightState = nextPhase;
    timer = 0;
  }
}

function drawEnvironment() {
  // Road surface
  ctx.fillStyle = "#444";
  ctx.fillRect(0, canvas.height/2 - roadWidth/2, canvas.width, roadWidth);
  ctx.fillRect(canvas.width/2 - roadWidth/2, 0, roadWidth, canvas.height);

  // Markings
  ctx.strokeStyle = "white";
  ctx.setLineDash([10, 10]);
  ctx.strokeRect(canvas.width/2 - roadWidth/2, canvas.height/2 - roadWidth/2, roadWidth, roadWidth);

  // Traffic Light Bulbs
  const cx = canvas.width/2; const cy = canvas.height/2;
  const off = roadWidth/2 + 20;

  function drawBulb(x, y, active) {
    ctx.fillStyle = active ? (lightState === "RED_ALL" ? "#f1c40f" : "#2ecc71") : "#e74c3c";
    ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "black"; ctx.lineWidth = 2; ctx.stroke();
  }

  drawBulb(cx - off, cy - off, lightState === "NS"); // North side
  drawBulb(cx + off, cy + off, lightState === "NS"); // South side
  drawBulb(cx + off, cy - off, lightState === "EW"); // East side
  drawBulb(cx - off, cy + off, lightState === "EW"); // West side
}

function animate() {
  if (!running) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawEnvironment();
  updateLights();

  for (let i = 0; i < cars.length; i++) {
    let car = cars[i];
    if (car.finished) continue;

    let frontCar = null;
    let minDist = 100;
    for (let j = 0; j < cars.length; j++) {
      let other = cars[j];
      if (car === other || other.finished) continue;
      // Simple detection: is other car ahead in our path?
      const dist = Math.hypot(car.x - other.x, car.y - other.y);
      if (dist < 50) {
          // Check if 'other' is roughly in the direction 'car' is facing
          const angleToOther = Math.atan2(other.y - car.y, other.x - car.x);
          const carAngle = Math.atan2(car.dy, car.dx);
          if (Math.abs(angleToOther - carAngle) < 0.5) {
              frontCar = other; break;
          }
      }
    }

    car.update(frontCar);
    car.draw();

    // Collision Check (Intersection only)
    if (Math.abs(car.x - 400) < 60 && Math.abs(car.y - 300) < 60) {
        for (let j = i + 1; j < cars.length; j++) {
            let other = cars[j];
            if (other.finished) continue;
            if (Math.hypot(car.x - other.x, car.y - other.y) < 18) {
                running = false;
                document.getElementById("crashOverlay").style.display = "flex";
            }
        }
    }
  }

  if (carsFinished >= 300) {
    running = false;
    document.getElementById("winOverlay").style.display = "flex";
  }

  requestAnimationFrame(animate);
}

function reset() {
  cars = [];
  carsFinished = 0;
  timer = 0;
  lightState = "NS";
  running = true;
  document.getElementById("uiOverlay").style.display = "none";
  document.getElementById("crashOverlay").style.display = "none";
  document.getElementById("winOverlay").style.display = "none";

  const perLane = 75; // 75 * 4 = 300 cars
  const colors = ["#3498db", "#e67e22", "#9b59b6", "#f1c40f", "#e74c3c"];
  
  for (let i = 0; i < perLane; i++) {
    const spacing = 70;
    const c = () => colors[Math.floor(Math.random() * colors.length)];
    // West to East
    cars.push(new Car(-(100 + i*spacing), 330, 1, 0, c()));
    // East to West
    cars.push(new Car(800 + (100 + i*spacing), 270, -1, 0, c()));
    // North to South
    cars.push(new Car(370, -(100 + i*spacing), 0, 1, c()));
    // South to North
    cars.push(new Car(430, 600 + (100 + i*spacing), 0, -1, c()));
  }
  animate();
}
</script>
</body>
</html>
