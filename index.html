<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloverleaf Simulation - Directional Lighting</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { background: #2c3e50; border: 4px solid #34495e; border-radius: 12px; margin-top: 15px; }
        .ui { padding: 15px; text-align: center; }
        button { padding: 10px 25px; cursor: pointer; background: #3498db; border: none; color: white; border-radius: 4px; font-weight: 600; transition: 0.2s; }
        button:hover { background: #2980b9; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="ui">
        <h2>Traffic Flow Analysis</h2>
        <p>Unified fleet with directional headlamps</p>
        <button onclick="addCar()">Deploy Vehicle</button>
    </div>
    <canvas id="simCanvas" width="800" height="800"></canvas>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const cars = [];

const roadWidth = 66;
const center = 400;
const loopRadius = 82;

class Car {
    constructor(lane) {
        this.lane = lane; 
        this.speed = 1.8 + Math.random() * 1.2;
        this.progress = 0;
        this.type = Math.floor(Math.random() * 3); 
        this.x = 0;
        this.y = 0;
        this.angle = 0;
        // All cars now use this color
        this.bodyColor = "#ecf0f1"; 
        this.roofColor = "#bdc3c7";
    }

    update() {
        const oldX = this.x;
        const oldY = this.y;
        this.progress += this.speed;
        this.calculatePosition();
        
        // Calculate heading angle based on movement
        this.angle = Math.atan2(this.y - oldY, this.x - oldX) + Math.PI/2;
    }

    calculatePosition() {
        let t = this.progress;
        let x = 0, y = 0;

        // Base path logic (North-bound reference)
        if (this.type === 0) { // Straight
            x = center + 18;
            y = 850 - t;
        } else if (this.type === 1) { // Right Turn
            if (t < 350) { x = center + 18; y = 850 - t; }
            else { 
                let angle = (t - 350) * 0.012;
                x = center + 18 + Math.sin(angle) * 60;
                y = 500 - Math.cos(angle) * 60;
            }
        } else { // Clover Loop
            if (t < 440) { x = center + 18; y = 850 - t; }
            else if (t < 880) {
                let loopT = (t - 440) * 0.015;
                x = (center + 18 + loopRadius) - Math.cos(loopT) * loopRadius;
                y = (center - 55) - Math.sin(loopT) * loopRadius;
            } else {
                x = center + 18 + (t - 880);
                y = center - 18;
            }
        }

        // Apply global rotation for the 4 entry points
        const relX = x - center;
        const relY = y - center;
        const rot = (this.lane * Math.PI) / 2;
        this.x = center + (relX * Math.cos(rot) - relY * Math.sin(rot));
        this.y = center + (relX * Math.sin(rot) + relY * Math.cos(rot));
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        // Shadow
        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(-6, -9, 14, 22);

        // Main Car Body
        ctx.fillStyle = this.bodyColor;
        ctx.fillRect(-6, -10, 12, 20);
        
        // Windshield/Roof
        ctx.fillStyle = "#34495e";
        ctx.fillRect(-4, -4, 8, 8);

        // Headlights (Yellow)
        ctx.fillStyle = "#f1c40f";
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#f1c40f";
        ctx.fillRect(-5, -11, 3, 2); // Left light
        ctx.fillRect(2, -11, 3, 2);  // Right light

        ctx.restore();
    }
}

function drawRoads() {
    // Pavement
    ctx.strokeStyle = "#34495e";
    ctx.lineWidth = roadWidth;
    ctx.beginPath();
    ctx.moveTo(center, 0); ctx.lineTo(center, 800);
    ctx.moveTo(0, center); ctx.lineTo(800, center);
    ctx.stroke();

    // Loops
    ctx.lineWidth = 32;
    const offsets = [68, -68];
    offsets.forEach(ox => {
        offsets.forEach(oy => {
            ctx.beginPath();
            ctx.arc(center + ox, center + oy, 52, 0, Math.PI * 2);
            ctx.stroke();
        });
    });

    // Markings
    ctx.strokeStyle = "rgba(255,255,255,0.3)";
    ctx.setLineDash([10, 15]);
    ctx.lineWidth = 2;
    ctx.stroke(); // Draws the markings on the loops
    
    ctx.beginPath();
    ctx.moveTo(center, 0); ctx.lineTo(center, 800);
    ctx.moveTo(0, center); ctx.lineTo(800, center);
    ctx.stroke();
}

function addCar() {
    cars.push(new Car(Math.floor(Math.random() * 4)));
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawRoads();
    
    for (let i = cars.length - 1; i >= 0; i--) {
        cars[i].update();
        cars[i].draw();
        if (cars[i].x < -100 || cars[i].x > 900 || cars[i].y < -100 || cars[i].y > 900) {
            cars.splice(i, 1);
        }
    }
    requestAnimationFrame(animate);
}

// Populate and Start
setInterval(() => { if(cars.length < 20) addCar(); }, 800);
animate();
</script>
</body>
</html>
